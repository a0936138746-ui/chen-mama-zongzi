<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陳媽媽肉粽訂單系統</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-amber-50">

  <div class="max-w-5xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6 text-amber-800">
      陳媽媽肉粽訂單系統
    </h1>

    <button onclick="loadProducts()" 
      class="bg-amber-700 text-white px-6 py-3 rounded-xl mb-6">
      讀取商品
    </button>

    <p id="status" class="mb-4 text-gray-700"></p>

    <div id="product-list" class="grid grid-cols-2 gap-4"></div>
  </div>

<script>
const SUPABASE_URL = "https://rlflaetzhtuvgggnqzea.supabase.co";

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsZmxhZXR6aHR1dmdnZ25xemVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTI3NDgsImV4cCI6MjA5MjE2ODc0OH0.1Bl8SE9KAQ68krOJz_1ThlN2tYYl9pwgE8XQghponn8";

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadProducts() {
  const status = document.getElementById("status");
  const container = document.getElementById("product-list");

  status.innerText = "正在讀取商品資料...";
  container.innerHTML = "";

  const { data, error } = await db
    .from("products")
    .select("*")
    .order("id", { ascending: true });

  if (error) {
    status.innerText = "資料庫讀取失敗：" + error.message;
    alert("錯誤：" + error.message);
    console.error(error);
    return;
  }

  status.innerText = "成功讀取 " + data.length + " 筆商品";

  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "bg-white p-4 rounded-xl shadow";

    div.innerHTML = `
      <h2 class="text-xl font-bold">${p.name}</h2>
      <p class="text-gray-600">價格：NT$ ${p.price}</p>
      <p class="text-sm text-gray-400">庫存：${p.stock}</p>
    `;

    container.appendChild(div);
  });
}
</script>

</body>
</html>
