<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陳媽媽肉粽後台管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-100">
  <div class="max-w-7xl mx-auto bg-white min-h-screen shadow-xl">
    <header class="bg-amber-800 text-white p-6 flex justify-between items-center">
      <h1 class="text-3xl font-bold">🍙 陳媽媽肉粽後台管理</h1>
      <button onclick="refreshAll()" class="bg-white text-amber-800 px-5 py-2 rounded-2xl font-bold hover:bg-amber-100">
        🔄 重新整理全部
      </button>
    </header>

    <div class="p-8">
      <h2 class="text-2xl font-bold mb-6">商品列表（點擊加入訂單）</h2>
      <div id="products" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12"></div>

      <h2 class="text-2xl font-bold mb-6">新增訂單</h2>
      <div class="bg-amber-50 p-8 rounded-3xl mb-12">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input id="name" type="text" placeholder="客戶姓名" class="border p-4 rounded-2xl text-lg">
          <input id="phone" type="text" placeholder="客戶電話" class="border p-4 rounded-2xl text-lg">
          <input id="items" type="text" placeholder="商品明細" class="border p-4 rounded-2xl text-lg col-span-2">
          <button onclick="submitOrder()" class="bg-amber-600 hover:bg-amber-700 text-white py-5 rounded-3xl text-xl font-bold col-span-2">
            新增訂單（自動存入 Google Sheets）
          </button>
        </div>
      </div>

      <h2 class="text-2xl font-bold mb-6">最新訂單列表</h2>
      <div id="order-list" class="space-y-4"></div>
    </div>
  </div>

  <script>
    const SHEET_ID = '1m9K_fcsoMYMOA_CvHYypXlWOOUU8RAArD4R5MikV-qw';
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzvaoqEoXmzwRAhMrsGE4wIY3Z8ha3QV2NDME3MGzL80j5slPAqRbZN7G_Vt6gE_A4/exec';

    async function loadProducts() {
      try {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=商品列表`;
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));

        const container = document.getElementById('products');
        container.innerHTML = '';

        json.table.rows.slice(1).forEach(row => {
          const name = row.c[1]?.v || '未知商品';
          const price = row.c[2]?.v || 0;
          const stock = row.c[3]?.v || 0;

          const card = document.createElement('div');
          card.className = `bg-white p-6 rounded-3xl shadow cursor-pointer hover:shadow-2xl hover:-translate-y-1 transition-all`;
          card.innerHTML = `
            <div class="font-bold text-xl">${name}</div>
            <div class="text-4xl font-bold text-amber-600 mt-2">$${price}</div>
            <div class="mt-4 text-sm">庫存: <span class="font-bold ${stock <= 10 ? 'text-red-500' : 'text-emerald-600'}">${stock}</span></div>
          `;
          card.addEventListener('click', () => addToOrder(name));
          container.appendChild(card);
        });
      } catch(e) { console.error(e); }
    }

    function addToOrder(name) {
      const itemsInput = document.getElementById('items');
      itemsInput.value = itemsInput.value ? itemsInput.value + '、' + name + ' x1' : name + ' x1';
    }

    async function submitOrder() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const items = document.getElementById('items').value.trim();

      if (!name || !items) {
        alert('請填寫客戶姓名和商品明細');
        return;
      }

      const orderData = [
        `ORD-${Date.now().toString().slice(-6)}`,
        new Date().toLocaleDateString('zh-TW'),
        name,
        phone || '',
        items,
        '',
        '待處理',
        ''
      ];

      try {
        await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'addOrder', data: orderData })
        });
        alert('✅ 訂單已成功存入 Google Sheets！');
        loadOrders();   // 自動刷新
      } catch (e) {
        alert('訂單已新增，但 Google Sheets 連線異常');
      }

      document.getElementById('name').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('items').value = '';
    }

    async function loadOrders() {
      try {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=訂單列表`;
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));

        const container = document.getElementById('order-list');
        container.innerHTML = '';

        const rows = json.table.rows.slice(1).reverse();  // 最新在上面

        if (rows.length === 0) {
          container.innerHTML = `<p class="text-gray-500 text-center py-20">目前還沒有訂單</p>`;
          return;
        }

        rows.forEach(row => {
          const orderId = row.c[0]?.v || '無ID';
          const date = row.c[1]?.v || '';
          const customer = row.c[2]?.v || '';
          const phone = row.c[3]?.v || '';
          const items = row.c[4]?.v || '';
          const status = row.c[6]?.v || '待處理';

          const statusColor = status.includes('已取貨') ? 'bg-emerald-100 text-emerald-700' : 
                             status.includes('待處理') ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-gray-700';

          const card = document.createElement('div');
          card.className = `bg-white border border-gray-200 rounded-3xl p-6 shadow hover:shadow-md transition-all`;
          card.innerHTML = `
            <div class="flex justify-between items-start">
              <div>
                <div class="font-bold text-lg">${orderId}</div>
                <div class="text-sm text-gray-500 mt-1">${date}　${customer} ${phone}</div>
              </div>
              <span class="px-4 py-1 rounded-full text-sm font-medium ${statusColor}">${status}</span>
            </div>
            <div class="mt-4 text-gray-700 leading-relaxed">${items}</div>
          `;
          container.appendChild(card);
        });
      } catch (e) {
        console.error("讀取訂單失敗", e);
        document.getElementById('order-list').innerHTML = `<p class="text-red-500 text-center py-12">讀取訂單失敗，請刷新頁面</p>`;
      }
    }

    function refreshAll() {
      loadProducts();
      loadOrders();
    }

    window.onload = () => {
      loadProducts();
      loadOrders();
    };
  </script>
</body>
</html>
