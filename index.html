<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陳媽媽肉粽訂單系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-amber-50 min-h-screen">
<div class="max-w-7xl mx-auto bg-white min-h-screen shadow-xl">

<header class="bg-amber-800 text-white p-5 flex justify-between items-center">
  <h1 class="text-2xl font-bold">陳媽媽肉粽訂單系統</h1>
  <div class="flex gap-3">
    <button onclick="showPage('front')" class="bg-white text-amber-800 px-4 py-2 rounded-xl font-bold">前台</button>
    <button onclick="showPage('admin')" class="bg-amber-600 px-4 py-2 rounded-xl font-bold">後台</button>
  </div>
</header>

<!-- 前台 -->
<section id="frontPage" class="p-6">
  <h2 class="text-2xl font-bold mb-4">前台下單</h2>

  <div class="bg-white rounded-2xl shadow p-5 mb-6">
    <div class="grid md:grid-cols-2 gap-4 mb-4">
      <input id="customerName" class="border p-3 rounded-xl" placeholder="客戶姓名">
      <input id="customerPhone" class="border p-3 rounded-xl" placeholder="客戶電話">
    </div>

    <select id="delivery" class="border p-3 rounded-xl w-full mb-4">
      <option value="自取">自取</option>
      <option value="宅配">宅配</option>
      <option value="有限外送">有限外送</option>
    </select>

    <div class="grid md:grid-cols-2 gap-4 mb-4">
      <input id="pickupDate" type="date" class="border p-3 rounded-xl">
      <input id="address" class="border p-3 rounded-xl" placeholder="地址">
    </div>

    <textarea id="note" class="border p-3 rounded-xl w-full mb-4" placeholder="備註"></textarea>

    <h3 class="font-bold mb-2">購物車</h3>
    <div id="cartBox" class="bg-amber-50 p-4 rounded-xl mb-4">尚未加入商品</div>

    <div class="text-xl font-bold mb-4">總金額：NT$ <span id="totalAmount">0</span></div>

    <button onclick="submitOrder()" class="bg-green-700 text-white px-6 py-3 rounded-xl font-bold">
      送出訂單
    </button>
  </div>

  <button onclick="loadProducts()" class="bg-amber-700 text-white px-6 py-3 rounded-xl mb-5">重新讀取商品</button>
  <div id="productList" class="grid md:grid-cols-3 gap-4"></div>
</section>

<!-- 後台 -->
<section id="adminPage" class="hidden p-6">
  <div id="loginBox" class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow">
    <h2 class="text-2xl font-bold mb-4">後台登入</h2>
    <input id="adminPassword" type="password" class="border p-3 rounded-xl w-full mb-4" placeholder="請輸入密碼">
    <button onclick="loginAdmin()" class="bg-amber-800 text-white px-6 py-3 rounded-xl w-full font-bold">
      進入後台
    </button>
  </div>

  <div id="adminContent" class="hidden">
    <div class="flex flex-wrap gap-3 mb-6">
      <button onclick="showAdminTab('orders')" class="adminBtn bg-amber-700 text-white px-4 py-2 rounded-xl">訂單管理</button>
      <button onclick="showAdminTab('todo')" class="adminBtn bg-amber-700 text-white px-4 py-2 rounded-xl">今日待辦</button>
      <button onclick="showAdminTab('paper')" class="adminBtn bg-amber-700 text-white px-4 py-2 rounded-xl">紙本/電話訂單</button>
      <button onclick="showAdminTab('expenses')" class="adminBtn bg-amber-700 text-white px-4 py-2 rounded-xl">成本支出</button>
      <button onclick="showAdminTab('stats')" class="adminBtn bg-amber-700 text-white px-4 py-2 rounded-xl">營運統計</button>
      <button onclick="showAdminTab('stock')" class="adminBtn bg-amber-700 text-white px-4 py-2 rounded-xl">庫存查看</button>
    </div>

    <div id="adminPanel"></div>
  </div>
</section>

</div>

<script>
const SUPABASE_URL = "https://rlflaetzhtuvgggnqzea.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsZmxhZXR6aHR1dmdnZ25xemVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTI3NDgsImV4cCI6MjA5MjE2ODc0OH0.1Bl8SE9KAQ68krOJz_1ThlN2tYYl9pwgE8XQghponn8";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let products = [];
let orders = [];
let expenses = [];
let cart = [];

function money(n) {
  return Number(n || 0).toLocaleString("zh-TW");
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function showPage(page) {
  document.getElementById("frontPage").classList.toggle("hidden", page !== "front");
  document.getElementById("adminPage").classList.toggle("hidden", page !== "admin");
}

function loginAdmin() {
  const pw = document.getElementById("adminPassword").value;
  if (pw !== "1127") {
    alert("密碼錯誤");
    return;
  }
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("adminContent").classList.remove("hidden");
  loadAdminData();
}

async function loadProducts() {
  const { data, error } = await db.from("products").select("*").order("id", { ascending: true });
  if (error) {
    alert("商品讀取失敗：" + error.message);
    return;
  }
  products = data || [];
  renderProducts();
}

function renderProducts() {
  const box = document.getElementById("productList");
  box.innerHTML = "";

  products.filter(p => p.active !== false && p.type !== "fee").forEach(p => {
    const card = document.createElement("div");
    card.className = "bg-white p-5 rounded-2xl shadow";
    card.innerHTML = `
      <h3 class="text-xl font-bold">${p.name}</h3>
      <p class="text-amber-700 font-bold text-lg">NT$ ${p.price}</p>
      <p class="text-sm text-gray-500 mb-3">庫存：${p.stock ?? 0}</p>
      <div class="flex gap-2">
        <input id="qty-${p.id}" type="number" min="1" value="1" class="border p-2 rounded-xl w-20">
        <button onclick="addToCart(${p.id})" class="bg-amber-700 text-white px-4 py-2 rounded-xl">加入</button>
      </div>
    `;
    box.appendChild(card);
  });
}

function addToCart(id) {
  const p = products.find(x => Number(x.id) === Number(id));
  const qty = Number(document.getElementById("qty-" + id).value);
  if (!p || qty <= 0) return;

  const existing = cart.find(x => Number(x.id) === Number(id));
  if (existing) existing.qty += qty;
  else cart.push({ id: p.id, name: p.name, price: p.price, qty });

  renderCart();
}

function renderCart() {
  const box = document.getElementById("cartBox");
  const totalBox = document.getElementById("totalAmount");

  if (cart.length === 0) {
    box.innerHTML = "尚未加入商品";
    totalBox.innerText = "0";
    return;
  }

  let total = 0;
  box.innerHTML = cart.map((item, i) => {
    const sub = item.price * item.qty;
    total += sub;
    return `
      <div class="flex justify-between border-b py-2">
        <span>${item.name} x ${item.qty}</span>
        <span>NT$ ${money(sub)}
          <button onclick="removeCart(${i})" class="text-red-600 ml-3">刪除</button>
        </span>
      </div>
    `;
  }).join("");

  totalBox.innerText = money(total);
}

function removeCart(i) {
  cart.splice(i, 1);
  renderCart();
}

async function submitOrder() {
  const name = document.getElementById("customerName").value.trim();
  const phone = document.getElementById("customerPhone").value.trim();
  const delivery = document.getElementById("delivery").value;
  const pickupDate = document.getElementById("pickupDate").value;
  const address = document.getElementById("address").value.trim();
  const note = document.getElementById("note").value.trim();

  if (!name) return alert("請輸入姓名");
  if (cart.length === 0) return alert("請先加入商品");

  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);

  const order = {
    id: "ORD" + Date.now(),
    time: new Date().toISOString(),
    name,
    phone,
    address,
    delivery,
    pickup_date: delivery === "宅配" ? null : (pickupDate || null),
    arrival_date: delivery === "宅配" ? (pickupDate || null) : null,
    ship_date: null,
    note,
    items: cart,
    total,
    status: "未完成",
    type: "normal"
  };

  const { error } = await db.from("orders").insert([order]);
  if (error) {
    alert("訂單送出失敗：" + error.message);
    return;
  }

  alert("訂單送出成功！");
  cart = [];
  renderCart();
  document.getElementById("customerName").value = "";
  document.getElementById("customerPhone").value = "";
  document.getElementById("address").value = "";
  document.getElementById("note").value = "";
}

async function loadAdminData() {
  await loadOrders();
  await loadExpenses();
  await loadProducts();
  showAdminTab("orders");
}

async function loadOrders() {
  const { data, error } = await db.from("orders").select("*").order("time", { ascending: false });
  if (error) {
    alert("訂單讀取失敗：" + error.message);
    return;
  }
  orders = data || [];
}

async function loadExpenses() {
  const { data, error } = await db.from("expenses").select("*").order("date", { ascending: false });
  if (error) {
    expenses = [];
    return;
  }
  expenses = data || [];
}

function showAdminTab(tab) {
  if (tab === "orders") renderOrders();
  if (tab === "todo") renderTodo();
  if (tab === "paper") renderPaperOrder();
  if (tab === "expenses") renderExpenses();
  if (tab === "stats") renderStats();
  if (tab === "stock") renderStock();
}

function renderOrders() {
  const panel = document.getElementById("adminPanel");
  panel.innerHTML = `
    <h2 class="text-2xl font-bold mb-4">訂單管理</h2>
    <button onclick="refreshAdmin()" class="bg-blue-600 text-white px-4 py-2 rounded-xl mb-4">重新整理</button>
    <div class="space-y-4">
      ${orders.map(o => orderCard(o)).join("")}
    </div>
  `;
}

function orderCard(o) {
  const items = Array.isArray(o.items) ? o.items : [];
  return `
    <div class="bg-white p-5 rounded-2xl shadow border">
      <div class="flex justify-between flex-wrap gap-2">
        <div>
          <div class="font-bold text-lg">${o.name || ""}｜${o.phone || ""}</div>
          <div class="text-sm text-gray-500">${new Date(o.time).toLocaleString("zh-TW")}</div>
          <div class="text-sm">方式：${o.delivery || ""}｜日期：${o.pickup_date || o.arrival_date || "未填"}</div>
          <div class="text-sm">地址：${o.address || ""}</div>
          <div class="text-sm">備註：${o.note || ""}</div>
        </div>
        <div class="text-right">
          <div class="text-xl font-bold text-amber-700">NT$ ${money(o.total)}</div>
          <select onchange="updateOrderStatus('${o.id}', this.value)" class="border p-2 rounded-xl mt-2">
            ${["未完成","已取貨","已宅配","已取消"].map(s => `
              <option value="${s}" ${o.status === s ? "selected" : ""}>${s}</option>
            `).join("")}
          </select>
        </div>
      </div>
      <div class="bg-amber-50 rounded-xl p-3 mt-3">
        ${items.map(i => `<div>${i.name} x ${i.qty}｜NT$ ${money(i.price * i.qty)}</div>`).join("")}
      </div>
    </div>
  `;
}

async function updateOrderStatus(id, status) {
  const { error } = await db.from("orders").update({ status }).eq("id", id);
  if (error) {
    alert("狀態更新失敗：" + error.message);
    return;
  }
  alert("狀態已更新");
  await refreshAdmin();
}

function renderTodo() {
  const today = todayStr();
  const list = orders.filter(o => 
    o.status === "未完成" && (o.pickup_date === today || o.arrival_date === today || o.ship_date === today)
  );

  document.getElementById("adminPanel").innerHTML = `
    <h2 class="text-2xl font-bold mb-4">今日待辦</h2>
    <div class="bg-yellow-50 border border-yellow-300 p-4 rounded-2xl mb-4">
      今天需要處理 ${list.length} 筆
    </div>
    <div class="space-y-4">${list.map(o => orderCard(o)).join("") || "今天沒有待辦"}</div>
  `;
}

function renderPaperOrder() {
  document.getElementById("adminPanel").innerHTML = `
    <h2 class="text-2xl font-bold mb-4">新增紙本 / 電話訂單</h2>
    <div class="bg-white p-5 rounded-2xl shadow">
      <div class="grid md:grid-cols-2 gap-4 mb-4">
        <input id="paperName" class="border p-3 rounded-xl" placeholder="客戶姓名">
        <input id="paperPhone" class="border p-3 rounded-xl" placeholder="電話">
        <select id="paperDelivery" class="border p-3 rounded-xl">
          <option value="自取">自取</option>
          <option value="宅配">宅配</option>
          <option value="有限外送">有限外送</option>
        </select>
        <input id="paperDate" type="date" class="border p-3 rounded-xl">
        <input id="paperAddress" class="border p-3 rounded-xl md:col-span-2" placeholder="地址">
      </div>

      <div id="paperRows" class="space-y-3 mb-4"></div>
      <button onclick="addPaperRow()" class="bg-amber-600 text-white px-4 py-2 rounded-xl mb-4">新增商品列</button>

      <textarea id="paperNote" class="border p-3 rounded-xl w-full mb-4" placeholder="備註"></textarea>

      <button onclick="savePaperOrder()" class="bg-green-700 text-white px-6 py-3 rounded-xl font-bold">儲存紙本訂單</button>
    </div>
  `;
  addPaperRow();
}

function addPaperRow() {
  const id = Date.now();
  const row = document.createElement("div");
  row.className = "grid md:grid-cols-4 gap-3";
  row.innerHTML = `
    <select class="paperProduct border p-3 rounded-xl">
      ${products.filter(p => p.active !== false && p.type !== "fee").map(p => `
        <option value="${p.id}" data-price="${p.price}">${p.name}</option>
      `).join("")}
    </select>
    <input class="paperQty border p-3 rounded-xl" type="number" value="1" min="1">
    <input class="paperPrice border p-3 rounded-xl" type="number" placeholder="單價，可改">
    <button onclick="this.parentElement.remove()" class="bg-red-600 text-white rounded-xl">刪除</button>
  `;
  document.getElementById("paperRows").appendChild(row);
}

async function savePaperOrder() {
  const name = document.getElementById("paperName").value.trim();
  const phone = document.getElementById("paperPhone").value.trim();
  const delivery = document.getElementById("paperDelivery").value;
  const date = document.getElementById("paperDate").value;
  const address = document.getElementById("paperAddress").value.trim();
  const note = document.getElementById("paperNote").value.trim();

  if (!name) return alert("請填姓名");

  const rows = [...document.querySelectorAll("#paperRows > div")];
  const items = rows.map(r => {
    const sel = r.querySelector(".paperProduct");
    const p = products.find(x => String(x.id) === sel.value);
    const qty = Number(r.querySelector(".paperQty").value);
    const priceInput = r.querySelector(".paperPrice").value;
    const price = priceInput ? Number(priceInput) : Number(p.price);
    return { id: p.id, name: p.name, qty, price };
  }).filter(i => i.qty > 0);

  const total = items.reduce((s, i) => s + i.price * i.qty, 0);

  const order = {
    id: "PB" + Date.now(),
    time: new Date().toISOString(),
    name,
    phone,
    address,
    delivery,
    pickup_date: delivery === "宅配" ? null : (date || null),
    arrival_date: delivery === "宅配" ? (date || null) : null,
    ship_date: null,
    note,
    items,
    total,
    status: "未完成",
    type: "paper"
  };

  const { error } = await db.from("orders").insert([order]);
  if (error) {
    alert("紙本訂單新增失敗：" + error.message);
    return;
  }

  alert("紙本訂單已新增");
  await refreshAdmin();
  showAdminTab("orders");
}

function renderExpenses() {
  document.getElementById("adminPanel").innerHTML = `
    <h2 class="text-2xl font-bold mb-4">成本支出紀錄</h2>

    <div class="bg-white p-5 rounded-2xl shadow mb-6">
      <div class="grid md:grid-cols-3 gap-4 mb-4">
        <input id="expenseDate" type="date" class="border p-3 rounded-xl" value="${todayStr()}">
        <select id="expenseCategory" class="border p-3 rounded-xl">
          <option>食材</option>
          <option>包材</option>
          <option>物流</option>
          <option>人事</option>
          <option>設備場地</option>
          <option>行銷</option>
          <option>其他</option>
        </select>
        <input id="expenseItem" class="border p-3 rounded-xl" placeholder="項目名稱">
        <input id="expenseAmount" type="number" class="border p-3 rounded-xl" placeholder="金額">
        <input id="expensePayment" class="border p-3 rounded-xl" placeholder="付款方式">
        <input id="expenseNote" class="border p-3 rounded-xl" placeholder="備註">
      </div>

      <button onclick="saveExpense()" class="bg-green-700 text-white px-6 py-3 rounded-xl font-bold">新增支出</button>
    </div>

    <div class="space-y-3">
      ${expenses.map(e => `
        <div class="bg-white p-4 rounded-2xl shadow flex justify-between">
          <div>
            <div class="font-bold">${e.date}｜${e.category}｜${e.item}</div>
            <div class="text-sm text-gray-500">${e.payment_method || ""}｜${e.note || ""}</div>
          </div>
          <div class="font-bold text-red-700">NT$ ${money(e.amount)}</div>
        </div>
      `).join("") || "尚無支出紀錄"}
    </div>
  `;
}

async function saveExpense() {
  const item = document.getElementById("expenseItem").value.trim();
  const amount = Number(document.getElementById("expenseAmount").value);

  if (!item) return alert("請輸入項目名稱");
  if (!amount || amount <= 0) return alert("請輸入正確金額");

  const expense = {
    id: "EX" + Date.now(),
    date: document.getElementById("expenseDate").value,
    category: document.getElementById("expenseCategory").value,
    item,
    amount,
    payment_method: document.getElementById("expensePayment").value.trim(),
    note: document.getElementById("expenseNote").value.trim()
  };

  const { error } = await db.from("expenses").insert([expense]);
  if (error) {
    alert("新增支出失敗：" + error.message);
    return;
  }

  alert("支出已新增");
  await refreshAdmin();
  showAdminTab("expenses");
}

function renderStats() {
  const activeOrders = orders.filter(o => o.status !== "已取消");
  const revenue = activeOrders.reduce((s, o) => s + Number(o.total || 0), 0);
  const expenseTotal = expenses.reduce((s, e) => s + Number(e.amount || 0), 0);
  const profit = revenue - expenseTotal;

  document.getElementById("adminPanel").innerHTML = `
    <h2 class="text-2xl font-bold mb-4">營運統計</h2>
    <div class="grid md:grid-cols-3 gap-4">
      <div class="bg-green-50 p-6 rounded-2xl shadow">
        <div class="text-gray-600">總營收</div>
        <div class="text-3xl font-bold text-green-700">NT$ ${money(revenue)}</div>
      </div>
      <div class="bg-red-50 p-6 rounded-2xl shadow">
        <div class="text-gray-600">總支出</div>
        <div class="text-3xl font-bold text-red-700">NT$ ${money(expenseTotal)}</div>
      </div>
      <div class="bg-amber-50 p-6 rounded-2xl shadow">
        <div class="text-gray-600">粗估淨利</div>
        <div class="text-3xl font-bold text-amber-700">NT$ ${money(profit)}</div>
      </div>
    </div>

    <div class="mt-6 bg-white p-5 rounded-2xl shadow">
      <h3 class="font-bold mb-3">訂單狀態</h3>
      <div>未完成：${orders.filter(o => o.status === "未完成").length} 筆</div>
      <div>已完成：${orders.filter(o => o.status === "已取貨" || o.status === "已宅配").length} 筆</div>
      <div>已取消：${orders.filter(o => o.status === "已取消").length} 筆</div>
    </div>
  `;
}

function renderStock() {
  document.getElementById("adminPanel").innerHTML = `
    <h2 class="text-2xl font-bold mb-4">庫存查看</h2>
    <div class="grid md:grid-cols-3 gap-4">
      ${products.filter(p => p.type !== "fee").map(p => `
        <div class="bg-white p-5 rounded-2xl shadow ${Number(p.stock || 0) < 50 ? "border-2 border-red-400" : ""}">
          <div class="font-bold text-xl">${p.name}</div>
          <div class="text-amber-700 font-bold">NT$ ${p.price}</div>
          <div class="text-gray-600">庫存：${p.stock ?? 0}</div>
        </div>
      `).join("")}
    </div>
  `;
}

async function refreshAdmin() {
  await loadOrders();
  await loadExpenses();
  await loadProducts();
}

loadProducts();
</script>

</body>
</html>
