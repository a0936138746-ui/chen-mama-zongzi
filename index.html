<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陳媽媽肉粽訂單系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-amber-50">
  <div class="max-w-6xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6 text-amber-800">陳媽媽肉粽訂單系統</h1>

    <section class="bg-white p-5 rounded-2xl shadow mb-6">
      <h2 class="text-xl font-bold mb-4">新增訂單</h2>

      <div class="grid md:grid-cols-2 gap-4 mb-4">
        <input id="customerName" class="border p-3 rounded-xl" placeholder="客戶姓名">
        <input id="customerPhone" class="border p-3 rounded-xl" placeholder="客戶電話">
      </div>

      <textarea id="note" class="border p-3 rounded-xl w-full mb-4" placeholder="備註"></textarea>

      <h3 class="font-bold mb-2">購物車</h3>
      <div id="cart" class="bg-amber-50 p-4 rounded-xl mb-4 text-gray-700">尚未加入商品</div>

      <div class="text-xl font-bold mb-4">
        總金額：NT$ <span id="total">0</span>
      </div>

      <button onclick="submitOrder()" class="bg-green-700 text-white px-6 py-3 rounded-xl font-bold">
        送出訂單
      </button>

      <p id="status" class="mt-4 text-gray-700"></p>
    </section>

    <button onclick="loadProducts()" class="bg-amber-700 text-white px-6 py-3 rounded-xl mb-6">
      讀取商品
    </button>

    <div id="product-list" class="grid md:grid-cols-2 gap-4"></div>
  </div>

<script>
const SUPABASE_URL = "https://rlflaetzhtuvgggnqzea.supabase.co";

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsZmxhZXR6aHR1dmdnZ25xemVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTI3NDgsImV4cCI6MjA5MjE2ODc0OH0.1Bl8SE9KAQ68krOJz_1ThlN2tYYl9pwgE8XQghponn8";

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let products = [];
let cart = [];

async function loadProducts() {
  const status = document.getElementById("status");
  status.innerText = "正在讀取商品資料...";

  const { data, error } = await db
    .from("products")
    .select("*")
    .eq("active", true)
    .order("id", { ascending: true });

  if (error) {
    status.innerText = "讀取失敗：" + error.message;
    alert("錯誤：" + error.message);
    return;
  }

  products = data;
  renderProducts();
  status.innerText = "成功讀取 " + data.length + " 筆商品";
}

function renderProducts() {
  const container = document.getElementById("product-list");
  container.innerHTML = "";

  products.forEach(p => {
    const div = document.createElement("div");
    div.className = "bg-white p-5 rounded-2xl shadow";

    div.innerHTML = `
      <h2 class="text-2xl font-bold mb-2">${p.name}</h2>
      <p class="text-gray-700">價格：NT$ ${p.price}</p>
      <p class="text-gray-500 mb-3">庫存：${p.stock}</p>

      <div class="flex gap-2">
        <input id="qty-${p.id}" type="number" min="1" value="1"
          class="border p-2 rounded-xl w-24">
        <button onclick="addToCart(${p.id})"
          class="bg-amber-700 text-white px-4 py-2 rounded-xl">
          加入
        </button>
      </div>
    `;

    container.appendChild(div);
  });
}

function addToCart(productId) {
  const product = products.find(p => p.id === productId);
  const qty = Number(document.getElementById("qty-" + productId).value);

  if (!product || qty <= 0) {
    alert("數量不正確");
    return;
  }

  const existing = cart.find(item => item.id === productId);

  if (existing) {
    existing.qty += qty;
  } else {
    cart.push({
      id: product.id,
      name: product.name,
      price: product.price,
      qty: qty
    });
  }

  renderCart();
}

function renderCart() {
  const cartBox = document.getElementById("cart");
  const totalBox = document.getElementById("total");

  if (cart.length === 0) {
    cartBox.innerHTML = "尚未加入商品";
    totalBox.innerText = "0";
    return;
  }

  let total = 0;

  cartBox.innerHTML = cart.map(item => {
    const subtotal = item.price * item.qty;
    total += subtotal;

    return `
      <div class="flex justify-between border-b py-2">
        <span>${item.name} x ${item.qty}</span>
        <span>NT$ ${subtotal}</span>
      </div>
    `;
  }).join("");

  totalBox.innerText = total;
}

async function submitOrder() {
  const name = document.getElementById("customerName").value.trim();
  const phone = document.getElementById("customerPhone").value.trim();
  const note = document.getElementById("note").value.trim();
  const status = document.getElementById("status");

  if (!name) {
    alert("請輸入客戶姓名");
    return;
  }

  if (cart.length === 0) {
    alert("請先加入商品");
    return;
  }

  const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);

  const order = {
    id: "ORD-" + Date.now(),
    name: name,
    phone: phone,
    note: note,
    items: cart,
    total: total,
    status: "未完成",
    type: "normal",
    delivery: "自取"
  };

  status.innerText = "正在送出訂單...";

  const { error } = await db
    .from("orders")
    .insert([order]);

  if (error) {
    status.innerText = "訂單送出失敗：" + error.message;
    alert("錯誤：" + error.message);
    return;
  }

  alert("訂單送出成功！");
  status.innerText = "訂單已成功送出";

  cart = [];
  renderCart();

  document.getElementById("customerName").value = "";
  document.getElementById("customerPhone").value = "";
  document.getElementById("note").value = "";
}

loadProducts();
</script>

</body>
</html>
