<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陳媽媽肉粽訂單系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-amber-50 min-h-screen">
  <div class="max-w-6xl mx-auto bg-white shadow-2xl min-h-screen">
    <header class="bg-amber-800 text-white p-6 flex justify-between items-center">
      <h1 class="text-3xl font-bold flex items-center gap-3">
        🍙 陳媽媽肉粽訂單系統
      </h1>
      <div class="flex gap-8 text-sm font-medium">
        <button onclick="switchTab(0)" class="hover:text-amber-200">前台下單</button>
        <button onclick="switchTab(1)" class="hover:text-amber-200">後台管理</button>
      </div>
    </header>

    <div id="main" class="p-16 text-center">
      <div class="text-6xl mb-6">🔄</div>
      <h2 class="text-4xl font-bold text-amber-700 mb-4">系統載入中...</h2>
      <p id="status" class="text-xl text-gray-600">正在連接 Supabase 資料庫</p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://rlflaetztuvggnqzea.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsZmxhZXR6aHR1dmdnZ25xemVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTI3NDgsImV4cCI6MjA5MjE2ODc0OH0.1Bl8SE9KAQ68krOJz_1ThlN2tYYl9pwgE8XQghponn8';

    async function initApp() {
      const statusEl = document.getElementById('status');
      try {
        console.log('開始連接 Supabase...');
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const { data, error } = await supabase
          .from('products')
          .select('*')
          .limit(5);

        if (error) {
          console.error('Supabase 錯誤:', error);
          throw error;
        }

        console.log('成功讀取資料:', data);

        statusEl.innerHTML = `
          <span class="text-7xl mb-6 block">✅</span>
          <span class="text-4xl font-bold text-green-600 block">連接成功！</span>
          <p class="text-2xl mt-6">已成功讀取 ${data.length} 筆商品資料</p>
          <p class="mt-10 text-green-700">你的陳媽媽肉粽訂單系統已正式上線 🎉</p>
        `;

      } catch (err) {
        console.error('完整錯誤:', err);
        statusEl.innerHTML = `
          <span class="text-7xl mb-6 block">❌</span>
          <span class="text-3xl font-bold text-red-600 block">連接失敗</span>
          <p class="text-red-500 mt-4">${err.message || 'Failed to fetch'}</p>
          <p class="text-sm mt-8 text-gray-500">請告訴我錯誤訊息，我會繼續幫你修正</p>
        `;
      }
    }

    function switchTab(n) {
      alert('完整前後台功能開發中\n目前先測試資料庫連接是否正常');
    }

    window.onload = initApp;
  </script>
</body>
</html>
