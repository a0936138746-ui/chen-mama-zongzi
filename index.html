function toggleStockHistory(id) {
  const box = document.getElementById("stockHistoryBox-" + id);
  if (!box) return;

  box.classList.toggle("hidden");

  if (!box.classList.contains("hidden")) {
    loadStockHistory(id);

async function loadStockHistory(productId) {
  const list = document.getElementById("stockHistoryList-" + productId);
  if (!list) return;

  list.innerHTML = "載入中...";

const { data, error } = await db
  .from("stock_history")
  .select("*")
  .eq("productId", productId)
  .order("created_at", { ascending: false });

if (error) {
  list.innerHTML = "讀取失敗：" + error.message;
  return;
}

if (!data || data.length === 0) {
  list.innerHTML = "沒有紀錄";
  return;
}

list.innerHTML = data.map(x => `
  <div class="border-b py-1 flex justify-between items-center">
    <div>
      ${new Date(x.created_at).toLocaleString("zh-TW")}｜
      ${
  x.type === "in"
    ? "入庫"
    : x.type === "adjust"
    ? "盤點調整"
    : "出貨"
}
      ${x.qty}｜
      ${x.note || ""}
    </div>

    <button onclick="deleteStock(${x.id}, ${productId})"
      class="bg-red-500 text-white px-2 py-1 rounded">
      刪除
    </button>
  </div>
`).join("");
}
  
function toggleStockIn(id) {

  if (!box) return;

}

async function addStock(productId) {
  const qtyInput = document.getElementById("stockInQty-" + productId);
  const noteInput = document.getElementById("stockInNote-" + productId);

  const qty = Number(qtyInput.value);
  const note = noteInput.value || "";

  if (!qty || qty <= 0) {
    alert("請輸入正確數量");
    return;
  }

  const product = products.find(p => Number(p.id) === Number(productId));
  if (!product) return;

  const newStock = (product.stock || 0) + qty;

  // 更新庫存
  const { error } = await db.from("products")
    .update({ stock: newStock })
    .eq("id", productId);

  if (error) {
    alert("入庫失敗：" + error.message);
    return;
  }

  // 記錄入庫歷史（如果你有 stock_history 表）
const { error: historyError } = await db.from("stock_history").insert({
  productId: productId,
  qty: qty,
  type: "in",
  note: note
});

if (historyError) {
  alert("入庫成功，但紀錄寫入失敗：" + historyError.message);
  return;
}

  alert("入庫成功");

  // 清空欄位
  qtyInput.value = "";
  noteInput.value = "";

  // 重新載入商品
  await loadProducts();
  renderProductAdmin();
}

function toggleStockOut(id) {
  const box = document.getElementById(`stockOutBox-${id}`);

  if (!box) {
    alert("找不到出庫區塊");
    return;
  }

  box.classList.toggle("hidden");
}

async function removeStock(id) {
  const product = products.find(p => p.id === id);

  if (!product) {
    alert("找不到商品");
    return;
  }

  const qty = Number(
    document.getElementById(`stockOutQty-${id}`).value
  );

  const note =
    document.getElementById(`stockOutNote-${id}`).value || "";

  if (!qty || qty <= 0) {
    alert("請輸入正確數量");
    return;
  }

  const currentStock = Number(product.stock || 0);

  if (qty > currentStock) {
    if (!confirm(`目前庫存只有 ${currentStock}，仍要出庫？`)) {
      return;
    }
  }

  const newStock = currentStock - qty;

  const { error } = await db
    .from("products")
    .update({
      stock: newStock
    })
    .eq("id", id);

  if (error) {
    alert("出庫失敗：" + error.message);
    return;
  }

  await db.from("stock_history").insert([
  {
    productId: id,
    type: "out",
    qty,
    note
  }
]);

  alert("出庫成功");

  await loadProducts();
  renderProductAdmin();
}
  
async function adjustStock(productId) {
  const product = products.find(
    p => Number(p.id) === Number(productId)
  );

  if (!product) return;

  const actualStock = prompt(
    `${product.name}\n目前系統庫存：${product.stock || 0}\n\n請輸入實際庫存數量`
  );

  if (actualStock === null) return;

  const actual = Number(actualStock);

  if (isNaN(actual) || actual < 0) {
    alert("請輸入正確數字");
    return;
  }

  const currentStock = Number(product.stock || 0);
  const diff = actual - currentStock;

  const { error } = await db
    .from("products")
    .update({
      stock: actual
    })
    .eq("id", productId);

  if (error) {
    alert("盤點調整失敗：" + error.message);
    return;
  }

  await db.from("stock_history").insert({
    productId: productId,
    qty: diff,
    type: "adjust",
    note: `盤點調整：實際庫存 ${actual}`
  });

  alert("盤點調整成功");

  await loadProducts();
  renderProductAdmin();
}
  
async function deleteStock(id, productId) {
  if (!confirm("確定刪除這筆紀錄？")) return;

  const { error } = await db
    .from("stock_history")
    .delete()
    .eq("id", id);

  if (error) {
    alert("刪除失敗：" + error.message);
    return;
  }

  alert("刪除成功");

  loadStockHistory(productId);
}
  
function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function editOrderItemRowHtml(item, index) {
  const itemName = item.raw_name || item.name || "";
  const itemQty = Number(item.qty || 0);
  const itemPrice = Number(item.price || 0);

  return `
    <div class="editItemRow grid md:grid-cols-[1fr_90px_120px_auto] gap-2 bg-gray-50 p-3 rounded-xl">
      <input class="editItemName border p-3 rounded-xl" placeholder="商品名稱" value="${escapeHtml(itemName)}">
      <input class="editItemQty border p-3 rounded-xl" type="number" min="0" value="${itemQty}" oninput="updateEditOrderTotal()">
      <input class="editItemPrice border p-3 rounded-xl" type="number" min="0" value="${itemPrice}" oninput="updateEditOrderTotal()">
      <button type="button" onclick="this.closest('.editItemRow').remove(); updateEditOrderTotal();"
        class="mobile-action-btn bg-red-600 text-white px-4 py-2 rounded-xl font-bold">
        刪除
      </button>
      <input class="editItemId" type="hidden" value="${escapeHtml(item.id || ("edit-" + Date.now() + "-" + index))}">
      <input class="editItemUnit" type="hidden" value="${escapeHtml(item.unit || "")}">
      <input class="editItemRawName" type="hidden" value="${escapeHtml(item.raw_name || "")}">
    </div>
  `;
}

function closeEditOrderModal() {
  document.getElementById("editOrderModal")?.remove();
}

function updateEditOrderTotal() {
  let total = 0;

  document.querySelectorAll("#editItemRows .editItemRow").forEach(row => {
    const qty = Number(row.querySelector(".editItemQty")?.value || 0);
    const price = Number(row.querySelector(".editItemPrice")?.value || 0);
    total += qty * price;
  });

  const box = document.getElementById("editOrderTotal");
  if (box) box.innerText = money(total);
}

function addEditOrderProductRow() {
  const select = document.getElementById("editAddProduct");
  const product = products.find(p => String(p.id) === String(select?.value || ""));

  if (!product) {
    alert("請先選擇商品");
    return;
  }

  document.getElementById("editItemRows").insertAdjacentHTML(
    "beforeend",
    editOrderItemRowHtml({
      id: product.id,
      name: product.name,
      qty: 1,
      price: product.price
    }, Date.now())
  );

  select.value = "";
  updateEditOrderTotal();
}

async function saveEditOrder(id) {
  const order = orders.find(o => String(o.id) === String(id));
  if (!order) return;

  const newName = document.getElementById("editName").value.trim();
  const newPhone = document.getElementById("editPhone").value.trim();
  const newDelivery = document.getElementById("editDelivery").value;
  const newDate = document.getElementById("editDate").value;
  const newAddress = document.getElementById("editAddress").value.trim();
  const newNote = document.getElementById("editNote").value.trim();

  if (!newName) {
    alert("請輸入姓名");
    return;
  }

  const updatedItems = [...document.querySelectorAll("#editItemRows .editItemRow")]
    .map(row => {
      const name = row.querySelector(".editItemName").value.trim();
      const qty = Number(row.querySelector(".editItemQty").value || 0);
      const price = Number(row.querySelector(".editItemPrice").value || 0);
      const unit = row.querySelector(".editItemUnit").value;
      const rawName = row.querySelector(".editItemRawName").value;

      return {
        id: row.querySelector(".editItemId").value || ("edit-" + Date.now()),
        name: unit && rawName ? `${rawName}（${unit}）` : name,
        raw_name: rawName || undefined,
        unit: unit || undefined,
        qty,
        price
      };
    })
    .filter(item => item.name && item.qty > 0);

  if (updatedItems.length === 0) {
    alert("請至少保留一個商品");
    return;
  }

  const updateData = {
    name: newName,
    phone: newPhone,
    delivery: newDelivery,
    address: newAddress,
    note: newNote,
    items: updatedItems
  };

  const newTotal = updatedItems.reduce((sum, item) => {
    return sum + (Number(item.qty) * Number(item.price));
  }, 0);

  updateData.total = newTotal;

  if (newDelivery === "宅配") {
    updateData.arrival_date = newDate;
    updateData.pickup_date = null;
    updateData.ship_date = newDate ? addDays(newDate, -3) : null;
  } else {
    updateData.pickup_date = newDate;
    updateData.arrival_date = null;
    updateData.ship_date = null;
  }

  const { error } = await db
    .from("orders")
    .update(updateData)
    .eq("id", id);

  if (error) {
    alert("修改失敗：" + error.message);
    return;
  }

  alert("訂單修改成功");

  closeEditOrderModal();
  await refreshAdmin();
  renderOrders();
}
  
function renderPaperTotal() {
  let total = 0;

  document.querySelectorAll("#paperRows > div").forEach(row => {
    const qty = Number(row.querySelector(".paperQty")?.value || 0);
    const price = Number(row.querySelector(".paperPrice")?.value || 0);

    total += qty * price;
  });

  document.getElementById("paperTotal").innerText =
    total.toLocaleString("zh-TW");
  syncPaperPaidAmount();
}

function syncPaperPaidAmount() {
  const status = document.getElementById("paperPaymentStatus")?.value;
  const paidInput = document.getElementById("paperPaidAmount");
  const totalText = document.getElementById("paperTotal")?.innerText || "0";
  const total = Number(totalText.replace(/[^\d]/g, ""));

  if (!paidInput) return;

  if (status === "已收款") {
    paidInput.value = total || 0;
  }

  if (status === "未收款") {
    paidInput.value = "";
  }
}

  }
  products = data || [];
  renderProducts();
}

function renderProducts() {
  const box = document.getElementById("productList");
  box.innerHTML = "";

  products.filter(p => p.active !== false && p.type !== "fee").forEach(p => {
    const card = document.createElement("div");
    card.className = "bg-white p-5 rounded-2xl shadow";
    card.innerHTML = `
      <h3 class="text-xl font-bold">${p.name}</h3>
      <p class="text-amber-700 font-bold text-lg">NT$ ${p.price}</p>
      <p class="text-sm text-gray-500 mb-3">庫存：${p.stock ?? 0}</p>
      <div class="flex gap-2">
        <input id="qty-${p.id}" type="number" min="1" value="1" class="border p-2 rounded-xl w-20">
        <button onclick="addToCart(${p.id})" class="bg-amber-700 text-white px-4 py-2 rounded-xl">加入</button>
      </div>
    `;
    box.appendChild(card);
  });
}

function addToCart(id) {
  const p = products.find(x => Number(x.id) === Number(id));
  const qty = Number(document.getElementById("qty-" + id).value);
  if (!p || qty <= 0) return;

  const existing = cart.find(x => Number(x.id) === Number(id));
  if (existing) existing.qty += qty;
  else cart.push({ id: p.id, name: p.name, price: getPriceBySource(p), qty });

  renderCart();
}

function renderCart() {
  const box = document.getElementById("cartBox");
  const totalBox = document.getElementById("totalAmount");

  if (cart.length === 0) {
    box.innerHTML = "尚未加入商品";
    totalBox.innerText = "0";
    return;
  }

  let total = 0;
  box.innerHTML = cart.map((item, i) => {
    const sub = item.price * item.qty;
    total += sub;
    return `
      <div class="flex justify-between border-b py-2">
        <span>${item.name} x ${item.qty}</span>
        <span>NT$ ${money(sub)}
          <button onclick="removeCart(${i})" class="text-red-600 ml-3">刪除</button>
        </span>
      </div>
    `;
  }).join("");

  totalBox.innerText = money(total);
}

function removeCart(i) {
  cart.splice(i, 1);
  renderCart();
}

async function submitOrder() {
  const name = document.getElementById("customerName").value.trim();
  const phone = document.getElementById("customerPhone").value.trim();
  const delivery = document.getElementById("delivery").value;
  const pickupDate = document.getElementById("pickupDate").value;
  const address = document.getElementById("address").value.trim();
  const note = document.getElementById("note").value.trim();

  if (!name) return alert("請輸入姓名");
  if (cart.length === 0) return alert("請先加入商品");

  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);

  const order = {
    id: "ORD" + Date.now(),
    time: new Date().toISOString(),
    name,
    phone,
    address,
    delivery,
    pickup_date: delivery === "宅配" ? null : (pickupDate || null),
    arrival_date: delivery === "宅配" ? (pickupDate || null) : null,
    ship_date: delivery === "宅配" && pickupDate ? addDays(pickupDate, -3) : null,
    note,
    items: cart,
    total,
    status: "未完成",
    payment_status: "未收款",
    payment_method: "",
    paid_amount: 0,
    payment_note: "",
    type: "normal"
  };

  const { error } = await db.from("orders").insert([order]);
  if (error) {
    alert("訂單送出失敗：" + error.message);
    return;
  }

  alert("訂單送出成功！");
  cart = [];
  renderCart();
  document.getElementById("customerName").value = "";
  document.getElementById("customerPhone").value = "";
  document.getElementById("address").value = "";
  document.getElementById("note").value = "";
}

function isClosedOrder(o) {
  return o.status === "已取消" || o.status === "已取貨" || o.status === "已宅配";
}

function parseDateOnly(dateStr) {
  if (!dateStr) return null;
  const [year, month, day] = String(dateStr).split("-").map(Number);
  if (!year || !month || !day) return null;
  return new Date(year, month - 1, day);
}

function formatDateOnly(date) {
  if (!date) return "";
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function addDays(dateStr, days) {
  const date = parseDateOnly(dateStr);
  if (!date) return "";
  date.setDate(date.getDate() + days);
  return formatDateOnly(date);
}

function getProcessDate(o) {
  return o.delivery === "宅配"
    ? (o.arrival_date || "")
    : (o.pickup_date || o.arrival_date || "");
}

function getShipDate(o) {
  if (o.delivery === "宅配" && o.arrival_date) {
    return addDays(o.arrival_date, -3);
  }

  return o.ship_date || "";
}

function daysFromToday(dateStr) {
  const date = parseDateOnly(dateStr);
  const today = parseDateOnly(todayStr());
  if (!date || !today) return null;
  return Math.round((date - today) / 86400000);
}

function getOrderTextForAlerts(o) {
  return [
    o.note || "",
    o.payment_note || "",
    ...(o.items || []).map(i => `${i.name || ""} ${i.raw_name || ""}`)
  ].join(" ");
}

function hasEggYolkRequest(o) {
  const text = getOrderTextForAlerts(o)
    .replace(/\s+/g, "")
    .toLowerCase();

  if (!text.includes("蛋黃")) return false;
  if (/(不要|不用|不加|無|免|去|拿掉).*蛋黃|蛋黃.*(不要|不用|不加|無|免|去|拿掉)/.test(text)) return false;

  return /(加.*蛋黃|蛋黃.*加|一顆蛋黃|整顆蛋黃|蛋黃)/.test(text);
}

function getEggYolkWorkDays(o) {
  return daysFromToday(getShippingWorkDate(o) || getProcessDate(o));
}

function needsEggYolkPrep(o) {
  const days = getEggYolkWorkDays(o);
  return hasEggYolkRequest(o) && days !== null && days <= 5;
}

function addDemandToMap(map, productId, qty) {
  if (!productId || !qty) return;
  const key = String(productId);
  map[key] = (map[key] || 0) + Number(qty || 0);
}

function getOrderProductDemandMap(order) {
  const map = {};

  (order.items || []).forEach(item => {
    const itemQty = Number(item.qty || 0);
    const product = products.find(p => Number(p.id) === Number(item.id));

    if (
      product &&
      product.type === "box" &&
      Array.isArray(product.components)
    ) {
      product.components.forEach(comp => {
        addDemandToMap(
          map,
          comp.productId,
          Number(comp.qty || 0) * itemQty
        );
      });
      return;
    }

    addDemandToMap(map, item.id, itemQty);
  });

  return map;
}

function getStockWorkDate(o) {
  return getShippingWorkDate(o) || getProcessDate(o) || "9999-12-31";
}

function getStockShortageInfo(o) {
  if (!o || isClosedOrder(o)) {
    return { near: false, items: [], text: "" };
  }

  const workDate = getStockWorkDate(o);
  const days = daysFromToday(workDate);
  const near = days !== null && days <= 5;

  if (!near) {
    return { near, items: [], text: "" };
  }

  const sortedOrders = orders
    .filter(order => !isClosedOrder(order))
    .slice()
    .sort((a, b) => {
      const dateDiff = getStockWorkDate(a).localeCompare(getStockWorkDate(b));
      if (dateDiff !== 0) return dateDiff;
      return String(a.time || "").localeCompare(String(b.time || ""));
    });

  const demandBefore = {};

  for (const order of sortedOrders) {
    const demandMap = getOrderProductDemandMap(order);

    if (String(order.id) === String(o.id)) {
      const shortageItems = Object.entries(demandMap)
        .map(([productId, qty]) => {
          const product = products.find(p => Number(p.id) === Number(productId));
          if (!product) return null;

          const stock = Number(product.stock || 0);
          const alreadyReserved = Number(demandBefore[productId] || 0);
          const available = stock - alreadyReserved;
          const shortage = Number(qty || 0) - Math.max(available, 0);

          if (shortage <= 0) return null;

          return {
            productId,
            name: product.name || productId,
            need: Number(qty || 0),
            available,
            shortage
          };
        })
        .filter(Boolean);

      return {
        near,
        days,
        workDate,
        items: shortageItems,
        text: shortageItems
          .map(item => `${item.name} 缺 ${item.shortage}`)
          .join("、")
      };
    }

    Object.entries(demandMap).forEach(([productId, qty]) => {
      demandBefore[productId] =
        Number(demandBefore[productId] || 0) + Number(qty || 0);
    });
  }

  return { near, days, workDate, items: [], text: "" };
}

function hasNearStockShortage(o) {
  return getStockShortageInfo(o).items.length > 0;
}

function getOrderReminderBadges(o) {

  if (Number(o.total || 0) > 3000) {

}

function getOrderAlert(o) {
  if (isClosedOrder(o)) return [];

  const badges = [];
  const dateFields = [o.pickup_date, o.arrival_date, o.ship_date].filter(Boolean);
  const dateDiffs = dateFields
    .map(daysFromToday)
    .filter(diff => diff !== null);
  const processDays = daysFromToday(getProcessDate(o));
  const shipDate = getShipDate(o);
  const shipDays = daysFromToday(shipDate);
  const stockShortage = getStockShortageInfo(o);

  if (dateDiffs.includes(0)) {
    badges.push({ text: "🔴 今日需處理", cls: "bg-red-100 text-red-700 border-red-300" });
  } else if (dateDiffs.includes(1)) {
    badges.push({ text: "🟠 明天需處理", cls: "bg-orange-100 text-orange-700 border-orange-300" });
  } else if (dateDiffs.some(diff => diff > 1 && diff <= 3)) {
    badges.push({ text: "🟡 三天內需處理", cls: "bg-yellow-100 text-yellow-700 border-yellow-300" });
  }

  if (o.delivery === "宅配" && shipDays !== null) {
    if (shipDays === 0) {
      badges.push({ text: "📦 今天應寄出", cls: "bg-blue-100 text-blue-700 border-blue-300" });
    } else if (shipDays < 0) {
      badges.push({ text: "🚨 已超過寄出日", cls: "bg-red-100 text-red-700 border-red-300" });
    }
  }

  if (processDays !== null && processDays < 0) {
    badges.push({ text: "🚨 已逾期未結案", cls: "bg-red-100 text-red-700 border-red-300" });
  }

  if (hasEggYolkRequest(o)) {

  }

  if (Number(o.total || 0) > 3000) {
    badges.push({ text: "🔥 大單提醒", cls: "bg-amber-100 text-amber-700 border-amber-300" });
  }

  return badges;
}

function renderOrderBadges(o) {
  const badges = getOrderAlert(o);

  if (!badges.length) return "";

  return `

      }).join("")}
    </div>
  `;
}

function getOrderSortRank(o) {
  if (isClosedOrder(o)) return 7;

  const processDays = daysFromToday(getProcessDate(o));
  const shipDays = daysFromToday(getShipDate(o));

  if (processDays !== null && processDays < 0) return 1;
  if (hasNearStockShortage(o)) return 1;
  if (processDays === 0) return 2;
  if (o.delivery === "宅配" && shipDays !== null && shipDays <= 0) return 3;
  if (processDays === 1) return 4;
  if (processDays !== null && processDays > 1 && processDays <= 3) return 5;
  if (needsEggYolkPrep(o)) return 5;

  return 6;
}

function getOrderSortDate(o) {
  const rank = getOrderSortRank(o);

  if (rank === 3) {
    return getShipDate(o) || getProcessDate(o) || "9999-12-31";
  }

  return getProcessDate(o) || getShipDate(o) || "9999-12-31";
}

function renderOrders() {

    ? searchInput.value.trim()
    : (window.orderSearchKeyword || "");

        ${o.note || ""}
        ${(o.items || []).map(i => `${i.name || ""} ${i.raw_name || ""}`).join(" ")}

      const matchKeyword = searchText.includes(keyword.toLowerCase());
      const matchPayment =
        !paymentFilter ||
        (paymentFilter === "未結清" && getUnpaidAmount(o) > 0) ||
        getPaymentStatus(o) === paymentFilter;

      const matchDelivery = !deliveryFilter || o.delivery === deliveryFilter;
      const matchQuick =
        !quickFilter ||
        (quickFilter === "today" && !isClosedOrder(o) && daysFromToday(getProcessDate(o)) === 0) ||
        (quickFilter === "tomorrow" && !isClosedOrder(o) && daysFromToday(getProcessDate(o)) === 1) ||
        (quickFilter === "overdue" && !isClosedOrder(o) && daysFromToday(getProcessDate(o)) < 0) ||
        (quickFilter === "shipping" && !isClosedOrder(o) && o.delivery === "宅配") ||
        (quickFilter === "pickup" && !isClosedOrder(o) && o.delivery === "自取") ||
        (quickFilter === "unpaid" && getUnpaidAmount(o) > 0) ||
        (quickFilter === "eggYolk" && !isClosedOrder(o) && hasEggYolkRequest(o)) ||
        (quickFilter === "stockShortage" && !isClosedOrder(o) && hasNearStockShortage(o));

      return matchKeyword && matchPayment && matchStatus && matchDelivery && matchQuick;
    })
    .sort((a, b) => {
      const rankDiff = getOrderSortRank(a) - getOrderSortRank(b);
      if (rankDiff !== 0) return rankDiff;

      const dateDiff = getOrderSortDate(a).localeCompare(getOrderSortDate(b));
      if (dateDiff !== 0) return dateDiff;

  const overdueCount = orders.filter(o => !isClosedOrder(o) && daysFromToday(getProcessDate(o)) < 0).length;

  panel.innerHTML = `

    <div class="grid md:grid-cols-5 gap-3 mb-4">
      <input
        id="orderSearch"
        placeholder="搜尋姓名 / 電話 / 訂單編號 / 地址 / 商品"
        class="border p-3 rounded-xl md:col-span-2"
        value="${keyword}"
        oncompositionstart="handleOrderSearchCompositionStart()"
        oncompositionend="handleOrderSearchCompositionEnd(this)"
        oninput="handleOrderSearchInput(this)"
      >

      <select
        id="orderStatusFilter"
        class="border p-3 rounded-xl"
        onchange="window.orderStatusFilter=this.value; renderOrders()">
        ${["","未完成","已取貨","已宅配","已取消"].map(s => `
          <option value="${s}" ${statusFilter === s ? "selected" : ""}>
            ${s || "狀態篩選"}
          </option>
        `).join("")}
      </select>

      <select
        id="orderDeliveryFilter"
        class="border p-3 rounded-xl"
        onchange="window.orderDeliveryFilter=this.value; renderOrders()">
        ${["","自取","宅配","有限外送"].map(s => `
          <option value="${s}" ${deliveryFilter === s ? "selected" : ""}>
            ${s || "方式篩選"}
          </option>
        `).join("")}
      </select>

      <select
        id="orderPaymentFilter"
        class="border p-3 rounded-xl"
        onchange="renderOrders()">
        ${["","未結清","未收款","訂金","已收款","退款"].map(s => `

async function updateOrderStatus(id, status) {
  const { error } = await db.from("orders").update({ status }).eq("id", id);
  if (error) {
    alert("狀態更新失敗：" + error.message);
    return;
  }
  alert("狀態已更新");
  await refreshAdmin();
}

async function updateOrderPayment(id, field, value) {
  const updateData = {};
  const order = orders.find(o => String(o.id) === String(id));

  updateData[field] = field === "paid_amount"
    ? Number(value || 0)
    : value;

  if (field === "paid_amount" && order) {
    const paid = Number(value || 0);
    const total = Number(order.total || 0);

    if (paid >= total && total > 0) {
      updateData.payment_status = "已收款";
    } else if (paid > 0) {
      updateData.payment_status = "訂金";
    } else {
      updateData.payment_status = "未收款";
    }
  }

  if (field === "payment_status" && order) {
    if (value === "已收款") {
      updateData.paid_amount = Number(order.total || 0);
    }

    if (value === "未收款") {
      updateData.paid_amount = 0;
    }
  }

  const { error } = await db
    .from("orders")
    .update(updateData)
    .eq("id", id);

  if (error) {
    alert("付款資料更新失敗：" + error.message);
    return;
  }

  await refreshAdmin();
  renderOrders();
}

async function editPaymentNote(id) {
  const order = orders.find(o => String(o.id) === String(id));
  if (!order) return;

  const note = prompt("付款備註，例如匯款末五碼", order.payment_note || "");
  if (note === null) return;

  await updateOrderPayment(id, "payment_note", note);
}

function renderWarDashboard() {
  const activeOrders = orders.filter(o => o.status !== "已取消");
  const unfinishedOrders = activeOrders.filter(o => !isClosedOrder(o));

  const getDashboardDate = (o) => getProcessDate(o) || o.ship_date || "";
  const getTotalQty = (o) =>
    (o.items || []).reduce((sum, i) => sum + Number(i.qty || 0), 0);

  const todayList = unfinishedOrders.filter(o => daysFromToday(getDashboardDate(o)) === 0);
  const tomorrowList = unfinishedOrders.filter(o => daysFromToday(getDashboardDate(o)) === 1);
  const bigOrders = unfinishedOrders.filter(o => Number(o.total || 0) > 3000 || o.type === "project");
  const unpaidList = unfinishedOrders.filter(o => getUnpaidAmount(o) > 0);
  const shipTodayList = unfinishedOrders.filter(o => o.delivery === "宅配" && daysFromToday(getShipDate(o)) === 0);
  const shipOverdueList = unfinishedOrders.filter(o => o.delivery === "宅配" && daysFromToday(getShipDate(o)) < 0);
  const eggYolkList = unfinishedOrders.filter(o => hasEggYolkRequest(o));
  const eggYolkPrepList = unfinishedOrders.filter(o => needsEggYolkPrep(o));
  const stockShortageList = unfinishedOrders.filter(o => hasNearStockShortage(o));

  const duplicateGroups = Object.values(activeOrders.reduce((groups, o) => {
    const phone = String(o.phone || "").trim();
    const dates = [o.pickup_date, o.arrival_date, o.ship_date].filter(Boolean);

    if (!phone || dates.length === 0) return groups;

    dates.forEach(date => {
      const key = `${phone}__${date}`;

      if (!groups[key]) {
        groups[key] = {
          phone,
          date,
          orders: []
        };
      }

      groups[key].orders.push(o);

    return groups;

  const pendingCloseList = unfinishedOrders.filter(o => {
    const d = daysFromToday(getDashboardDate(o));

    const processDays = daysFromToday(getProcessDate(o));
    const shipDays = daysFromToday(getShipDate(o));

    return (
      (processDays !== null && processDays < 0) ||
      (o.delivery === "宅配" && shipDays !== null && shipDays < 0)

function getShippingWorkDate(o) {
  if (o.delivery === "宅配") {
    return getShipDate(o) || o.ship_date || o.arrival_date || "";
  }

  return o.pickup_date || o.arrival_date || "";
}

function getShippingDeliveryDate(o) {
  return o.delivery === "宅配"
    ? (o.arrival_date || "")
    : (o.pickup_date || o.arrival_date || "");
}

function getShippingItemText(o) {
  return (o.items || [])
    .map(i => {
      const name = i.raw_name || i.name || "";
      const qty = Number(i.qty || 0);
      const unit = i.unit ? i.unit : "";
      return `${name} x ${qty}${unit}`;
    })
    .join("\n");
}

function getShippingTotalQty(o) {
  return (o.items || []).reduce((sum, i) => {
    return sum + Number(i.qty || 0);
  }, 0);
}

function cleanShippingText(value) {
  return String(value || "")
    .replace(/\t/g, " ")
    .replace(/\r/g, "\n")
    .replace(/[ ]{2,}/g, " ")
    .trim();
}

function getShippingCustomerName(o) {
  return cleanShippingText(o.name)
    .replace(/訂購人姓別\s*[:：].*$/g, "")
    .replace(/收件人姓別\s*[:：].*$/g, "")
    .replace(/姓別\s*[:：].*$/g, "")
    .trim();
}

function getShippingPhoneText(o) {
  const text = cleanShippingText(o.phone);
  const mobile = text.match(/09\d{8}/);

  if (mobile) return mobile[0];

  return text
    .replace(/訂購人行動電話\s*[:：]/g, "")
    .replace(/訂購人聯絡電話\s*[:：]/g, "")
    .replace(/收件人電話\s*[:：]/g, "")
    .trim();
}

function getShippingAddressText(o) {
  return cleanShippingText(o.address)
    .replace(/收件人地址\s*[:：]/g, "")
    .replace(/訂購人地址\s*[:：]/g, "")
    .trim();
}

function getShippingNoteText(o) {
  const lines = cleanShippingText(o.note)
    .split("\n")
    .map(line => line.trim())
    .filter(Boolean)
    .filter(line => !/^(收件人姓名|訂購人姓名|收件人姓別|訂購人姓別|姓別|收件人地址|訂購人地址|訂購人行動電話|訂購人聯絡電話)\s*[:：]/.test(line));

  return lines.join("\n");
}

function getShippingReminderList(o) {
  const reminders = [];
  const processDays = daysFromToday(getProcessDate(o));
  const shipDays = daysFromToday(getShipDate(o));

  if (hasEggYolkRequest(o)) {
    reminders.push(needsEggYolkPrep(o) ? "蛋黃單先備料" : "加蛋黃+10");
  }

  const stockShortage = getStockShortageInfo(o);
  if (stockShortage.items.length) {
    reminders.push(`出貨近缺貨：${stockShortage.text}`);
  }

  if (o.delivery === "宅配" && shipDays !== null) {
    if (shipDays < 0) {
      reminders.push("已超過寄出日");
    } else if (shipDays === 0) {
      reminders.push("今天應寄出");
    } else if (shipDays === 1) {
      reminders.push("明天應寄出");
    } else if (shipDays > 1 && shipDays <= 3) {
      reminders.push("三天內應寄出");
    }
  }

  if (processDays !== null) {
    if (processDays < 0) {
      reminders.push("已逾期未結案");
    } else if (processDays === 0) {
      reminders.push("今日需處理");
    } else if (processDays === 1) {
      reminders.push("明天需處理");
    } else if (processDays > 1 && processDays <= 3) {
      reminders.push("三天內需處理");
    }
  }

  if (o.note && o.note.trim() !== "") {
    reminders.push("特殊備註");
  }

  if (Number(o.total || 0) > 3000) {
    reminders.push("大單");
  }

  return [...new Set(reminders)];
}

function getShippingReminder(o) {
  return getShippingReminderList(o).join(" / ");
}

function getShippingPriority(o) {
  const processDays = daysFromToday(getProcessDate(o));
  const shipDays = daysFromToday(getShipDate(o));

  if (processDays !== null && processDays < 0) return "A 逾期";
  if (o.delivery === "宅配" && shipDays !== null && shipDays < 0) return "A 逾期";
  if (hasNearStockShortage(o)) return "A 出貨近缺貨";
  if (processDays === 0 || (o.delivery === "宅配" && shipDays === 0)) return "B 今日";
  if (processDays === 1 || (o.delivery === "宅配" && shipDays === 1)) return "C 明日";
  if (
    (processDays !== null && processDays > 1 && processDays <= 3) ||
    (o.delivery === "宅配" && shipDays !== null && shipDays > 1 && shipDays <= 3)
  ) {
    return "D 三天內";
  }

  if (needsEggYolkPrep(o)) return "E 蛋黃預備";
  if (hasEggYolkRequest(o)) return "F 加蛋黃";
  if (o.note && o.note.trim() !== "") return "G 特別注意";
  if (Number(o.total || 0) > 3000) return "H 大單";

  return "I 一般";
}

function getShippingSortRank(o) {
  const priority = getShippingPriority(o);

  if (priority.startsWith("A")) return 1;
  if (priority.startsWith("B")) return 2;
  if (priority.startsWith("C")) return 3;
  if (priority.startsWith("D")) return 4;
  if (priority.startsWith("E")) return 5;
  if (priority.startsWith("F")) return 6;
  if (priority.startsWith("G")) return 7;
  if (priority.startsWith("H")) return 8;

  return 9;
}

function getFilteredShippingOrders() {
  const startDate = document.getElementById("shipStart")?.value || "";
  const endDate = document.getElementById("shipEnd")?.value || "";
  const mode = window.shippingMode || "all";

  return orders
    .filter(o => {
      if (isClosedOrder(o)) return false;

      const workDate = getShippingWorkDate(o);
      const processDays = daysFromToday(getProcessDate(o));
      const shipDays = daysFromToday(getShipDate(o));

      if (startDate && workDate < startDate) return false;
      if (endDate && workDate > endDate) return false;

      if (mode === "delivery" && o.delivery !== "宅配") return false;
      if (mode === "pickup" && o.delivery !== "自取") return false;
      if (mode === "today" && processDays !== 0 && !(o.delivery === "宅配" && shipDays === 0)) return false;
      if (mode === "tomorrow" && processDays !== 1 && !(o.delivery === "宅配" && shipDays === 1)) return false;
      if (mode === "overdue" && !(processDays !== null && processDays < 0) && !(o.delivery === "宅配" && shipDays !== null && shipDays < 0)) return false;
      if (mode === "unpaid" && getUnpaidAmount(o) <= 0) return false;

      return true;
    })
    .sort((a, b) => {
      const rankDiff = getShippingSortRank(a) - getShippingSortRank(b);
      if (rankDiff !== 0) return rankDiff;

      const workDateDiff = (getShippingWorkDate(a) || "9999-12-31")
        .localeCompare(getShippingWorkDate(b) || "9999-12-31");
      if (workDateDiff !== 0) return workDateDiff;

      const deliveryDiff = (getShippingDeliveryDate(a) || "9999-12-31")
        .localeCompare(getShippingDeliveryDate(b) || "9999-12-31");
      if (deliveryDiff !== 0) return deliveryDiff;

      return String(a.time || "").localeCompare(String(b.time || ""));
    });
}

function setShippingMode(mode) {
  window.shippingMode = mode;
  renderShippingList();
}

async function completeShippingOrder(id) {
  const order = orders.find(o => String(o.id) === String(id));
  if (!order) return;

  const status = order.delivery === "宅配" ? "已宅配" : "已取貨";

  if (!confirm(`確定將 ${order.name || "這筆訂單"} 標記為「${status}」？`)) {
    return;
  }

  const { error } = await db
    .from("orders")
    .update({ status })
    .eq("id", id);

  if (error) {
    alert("更新失敗：" + error.message);
    return;
  }

  alert("已完成結案");
  await refreshAdmin();
  renderShippingList();
}

function exportShippingExcel() {
  if (!window.XLSX) {
    alert("Excel 匯出套件尚未載入，請重新整理頁面後再試一次");
    return;
  }

  const list = getFilteredShippingOrders();

  if (!list.length) {
    alert("目前沒有可匯出的出貨 / 取貨訂單");
    return;
  }

  const headers = [
    "順序",
    "優先級",
    "提醒",
    "工作日期",
    "交付日期",
    "應寄出日",
    "方式",
    "姓名",
    "電話",
    "地址",
    "商品明細",
    "總數量",
    "總金額",
    "備註",
    "訂單編號",
    "狀態"
  ];

  const rows = list.map((o, index) => [
    index + 1,
    getShippingPriority(o),
    getShippingReminder(o),
    getShippingWorkDate(o) || "",
    getShippingDeliveryDate(o) || "",
    o.delivery === "宅配" ? (getShipDate(o) || "") : "",
    o.delivery || "",
    getShippingCustomerName(o),
    getShippingPhoneText(o),
    getShippingAddressText(o),
    getShippingItemText(o),
    getShippingTotalQty(o),
    Number(o.total || 0),
    getShippingNoteText(o),
    o.id || "",
    o.status || ""
  ]);

  const printHeaders = [
    "#",
    "處理",
    "客戶 / 地址",
    "商品",
    "備註"
  ];

  const printRows = list.map((o, index) => [
    index + 1,
    `${getShippingPriority(o)}\n${getShippingWorkDate(o) || ""}\n${o.delivery || ""}`,
    `${getShippingCustomerName(o)}\n${getShippingPhoneText(o)}\n${getShippingAddressText(o)}`,
    getShippingItemText(o),
    getShippingReminder(o) + (getShippingNoteText(o) ? `\n${getShippingNoteText(o)}` : "")
  ]);

  const printSheet = XLSX.utils.aoa_to_sheet([
    ["陳媽媽出貨 / 取貨清單"],
    [`匯出日期：${todayStr()}　筆數：${list.length}　排序：逾期、今日、明日、三天內、蛋黃預備、特殊備註、大單`],
    printHeaders,
    ...printRows
  ]);

  printSheet["!merges"] = [
    { s: { r: 0, c: 0 }, e: { r: 0, c: printHeaders.length - 1 } },
    { s: { r: 1, c: 0 }, e: { r: 1, c: printHeaders.length - 1 } }
  ];

  printSheet["!cols"] = [
    { wch: 4 },
    { wch: 14 },
    { wch: 30 },
    { wch: 32 },
    { wch: 24 }
  ];

  printSheet["!rows"] = [
    { hpt: 26 },
    { hpt: 20 },
    { hpt: 22 },
    ...printRows.map(row => {
      const processLines = String(row[1] || "").split("\n").length;
      const customerLines = String(row[2] || "").split("\n").length;
      const itemLines = String(row[3] || "").split("\n").length;
      const noteLines = String(row[4] || "").split("\n").length;
      const maxLines = Math.max(processLines, customerLines, itemLines, noteLines, 2);
      return { hpt: Math.max(42, Math.min(95, maxLines * 16)) };
    })
  ];

  printSheet["!autofilter"] = {
    ref: XLSX.utils.encode_range({
      s: { r: 2, c: 0 },
      e: { r: printRows.length + 2, c: printHeaders.length - 1 }
    })
  };

  printSheet["!freeze"] = {
    xSplit: 0,
    ySplit: 3
  };

  printSheet["!pageSetup"] = {
    paperSize: 9,
    orientation: "landscape",
    fitToWidth: 1,
    fitToHeight: 0,
    scale: 85
  };

  printSheet["!margins"] = {
    left: 0.2,
    right: 0.2,
    top: 0.35,
    bottom: 0.35,
    header: 0.15,
    footer: 0.15
  };

  const detailSheet = XLSX.utils.aoa_to_sheet([headers, ...rows]);

  detailSheet["!cols"] = [
    { wch: 6 },
    { wch: 12 },
    { wch: 28 },
    { wch: 12 },
    { wch: 12 },
    { wch: 12 },
    { wch: 10 },
    { wch: 12 },
    { wch: 15 },
    { wch: 34 },
    { wch: 42 },
    { wch: 8 },
    { wch: 12 },
    { wch: 30 },
    { wch: 18 },
    { wch: 10 }
  ];

  detailSheet["!rows"] = [
    { hpt: 24 },
    ...rows.map(row => ({
      hpt: Math.max(36, Math.min(120, String(row[10] || "").split("\n").length * 18))
    }))
  ];

  detailSheet["!autofilter"] = {
    ref: XLSX.utils.encode_range({
      s: { r: 0, c: 0 },
      e: { r: rows.length, c: headers.length - 1 }
    })
  };

  detailSheet["!freeze"] = {
    xSplit: 0,

  };

  detailSheet["!pageSetup"] = {
    paperSize: 9,
    orientation: "landscape",
    fitToWidth: 1,

  detailSheet["!margins"] = {

    right: 0.25,
    top: 0.45,
    bottom: 0.45,
    header: 0.2,
    footer: 0.2
  };

  detailSheet["!printHeader"] = [1, 1];

  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, printSheet, "A4列印版");
  XLSX.utils.book_append_sheet(workbook, detailSheet, "完整資料");

  const startDate = document.getElementById("shipStart")?.value || "";
  const endDate = document.getElementById("shipEnd")?.value || "";
  const rangeText = startDate || endDate

  XLSX.writeFile(

let websiteExcelImportOrders = [];

function normalizeWebsiteHeader(value) {
  return String(value || "")
    .replace(/\s/g, "")
    .replace(/[：:]/g, "")
    .trim();
}

function normalizeWebsiteName(value) {
  return String(value || "")
    .replace(/\s/g, "")
    .trim();
}

function normalizeWebsitePhone(value) {
  return String(value || "")
    .replace(/[^\d]/g, "")
    .trim();
}

function buildRowsFromWebsiteSheet(sheet) {
  const matrix = XLSX.utils.sheet_to_json(sheet, {
    header: 1,
    defval: "",
    raw: false
  });

  const headerIndex = matrix.findIndex(row => {
    const text = row.map(normalizeWebsiteHeader).join("|");
    return text.includes("訂購人") && text.includes("金額");
  });

  if (headerIndex === -1) {
    return XLSX.utils.sheet_to_json(sheet, { defval: "" });
  }

  const headers = matrix[headerIndex].map(normalizeWebsiteHeader);

  return matrix
    .slice(headerIndex + 1)
    .filter(row => row.some(cell => String(cell || "").trim() !== ""))
    .map(row => {
      const obj = {};
      headers.forEach((header, index) => {
        if (header) obj[header] = row[index] ?? "";
      });
      return obj;
    });
}

function decodeWebsiteExcelText(buffer) {
  const bytes = new Uint8Array(buffer);
  const utf8Text = new TextDecoder("utf-8", { fatal: false }).decode(bytes);

  if (/�/.test(utf8Text) || /<table/i.test(utf8Text)) {
    try {
      const big5Text = new TextDecoder("big5", { fatal: false }).decode(bytes);
      if (!/�/.test(big5Text) && /<table/i.test(big5Text)) {
        return big5Text;
      }
    } catch (e) {
      return utf8Text;
    }
  }

  return utf8Text;
}

function buildRowsFromWebsiteHtmlTable(htmlText) {
  const doc = new DOMParser().parseFromString(htmlText, "text/html");
  const table = doc.querySelector("table");
  if (!table) return [];

  const matrix = [...table.querySelectorAll("tr")].map(tr => {
    return [...tr.querySelectorAll("th,td")].map(td => td.textContent.trim());
  }).filter(row => row.some(cell => cell !== ""));

  if (matrix.length < 2) return [];

  const headers = matrix[0].map(normalizeWebsiteHeader);

  return matrix.slice(1).map(row => {
    const obj = {};
    headers.forEach((header, index) => {
      if (header) obj[header] = row[index] ?? "";
    });
    return obj;
  });
}

function getWebsiteCell(row, candidates) {
  const keys = Object.keys(row || {});
  for (const candidate of candidates) {
    const normalizedCandidate = normalizeWebsiteHeader(candidate);
    const key = keys.find(k => normalizeWebsiteHeader(k) === normalizedCandidate);
    if (key) return row[key];
  }

  for (const candidate of candidates) {
    const normalizedCandidate = normalizeWebsiteHeader(candidate);
    const key = keys.find(k => normalizeWebsiteHeader(k).includes(normalizedCandidate));
    if (key) return row[key];
  }

  return "";
}

function parseWebsiteAmount(value) {
  return Number(String(value || "0").replace(/[^\d.-]/g, "")) || 0;
}

function parseWebsiteDate(value) {
  if (!value) return new Date().toISOString();

  if (typeof value === "number") {
    const excelEpoch = new Date(Date.UTC(1899, 11, 30));
    excelEpoch.setUTCDate(excelEpoch.getUTCDate() + value);
    return excelEpoch.toISOString();
  }

  const date = new Date(String(value).replace(/\//g, "-"));
  return isNaN(date.getTime()) ? new Date().toISOString() : date.toISOString();
}

function parseWebsiteItems(row) {
  const itemText = String(
    getWebsiteCell(row, ["商品明細", "訂單明細", "商品", "商品名稱", "品項"]) || ""
  ).trim();

  if (!itemText) return [];

  const parts = itemText
    .split(/\n|、|,/)
    .map(x => x.trim())
    .filter(Boolean);

  return parts.map((text, index) => {
    const qtyMatch = text.match(/(?:x|X|＊|\*)\s*(\d+)/) || text.match(/(\d+)\s*(?:組|盒|包|顆|份)$/);
    const qty = qtyMatch ? Number(qtyMatch[1]) : 1;
    const name = text
      .replace(/(?:x|X|＊|\*)\s*\d+.*/, "")
      .replace(/\d+\s*(?:組|盒|包|顆|份)$/, "")
      .trim() || text;

    return {
      id: "webexcel-item-" + Date.now() + "-" + index,
      name,
      price: 0,
      qty
    };
  });
}

function getWebsiteDuplicateInfo(order) {
  const name = normalizeWebsiteName(order.name);
  const phone = normalizeWebsitePhone(order.phone);
  const total = Number(order.total || 0);

  const matches = orders.filter(existing => {
    const existingName = normalizeWebsiteName(existing.name);
    const existingPhone = normalizeWebsitePhone(existing.phone);
    const existingTotal = Number(existing.total || 0);

    if (phone && existingPhone && phone === existingPhone) return true;
    if (name && existingName && name === existingName) return true;
    if (name && existingName && name === existingName && total && existingTotal === total) return true;

    return false;
  });

  if (!matches.length) return "";

  return matches
    .slice(0, 3)
    .map(o => `${o.name || "未填"}｜${o.phone || ""}｜${getProcessDate(o) || ""}｜NT$ ${money(o.total)}`)
    .join("\n");
}

function inferWebsiteDelivery(row, address) {
  const deliveryText = String(getWebsiteCell(row, ["配送方式", "取貨方式", "交付方式", "運送方式"]) || "");

  if (deliveryText.includes("自取")) return "自取";
  if (deliveryText.includes("外送")) return "有限外送";
  if (address) return "宅配";

  return "宅配";
}

function mapWebsiteExcelRow(row, index) {
  const orderNo = String(getWebsiteCell(row, ["編號", "訂單編號", "訂單ID", "id", "ID"]) || "").trim();
  const name = String(getWebsiteCell(row, ["收件人姓名", "訂購人姓名", "訂購人", "收件人", "姓名"]) || "").trim();
  const phone = String(getWebsiteCell(row, ["收件人行動電話", "訂購人行動電話", "行動電話", "手機", "電話"]) || "").trim();
  const address = String(getWebsiteCell(row, ["收件人地址", "地址", "配送地址"]) || "").trim();
  const orderDate = String(getWebsiteCell(row, ["訂單日期", "建立時間", "日期"]) || "").trim();
  const total = parseWebsiteAmount(getWebsiteCell(row, ["總金額", "金額", "訂單金額"]));
  const freight = parseWebsiteAmount(getWebsiteCell(row, ["運費"]));
  const bank = String(getWebsiteCell(row, ["銀行名", "銀行"]) || "").trim();
  const bankLast5 = String(getWebsiteCell(row, ["未五碼", "末五碼", "後五碼", "匯款末五碼"]) || "").trim();
  const paymentMethod = String(getWebsiteCell(row, ["付款方式"]) || "").trim();
  const noteParts = [
    getWebsiteCell(row, ["其他說明", "備註"]),
    getWebsiteCell(row, ["處理說明"]),
    getWebsiteCell(row, ["收件時段"]),
    freight ? `官網運費：${freight}` : ""
  ].filter(Boolean);
  const items = parseWebsiteItems(row);
  const delivery = inferWebsiteDelivery(row, address);

  return {
    id: "WEBX" + (orderNo || Date.now() + "-" + index),
    time: parseWebsiteDate(orderDate),
    name,
    phone,
    address,
    delivery,
    pickup_date: delivery === "宅配" ? null : null,
    arrival_date: null,
    ship_date: null,
    note: noteParts.join("\n") || "官網 Excel 匯入",
    items: items.length ? items : [{
      id: "webexcel-row-" + Date.now() + "-" + index,
      name: "官網訂單品項未拆分",
      price: total,
      qty: 1
    }],
    total,
    status: "未完成",
    payment_status: "未收款",
    payment_method: paymentMethod || (bank || bankLast5 ? "匯款" : ""),
    paid_amount: 0,
    payment_note: [bank, bankLast5 ? `末五碼 ${bankLast5}` : ""].filter(Boolean).join("｜"),
    type: "web",
    source_order_id: orderNo
  };
}

async function previewWebsiteExcelImport() {
  const file = document.getElementById("websiteExcelFile")?.files?.[0];
  const preview = document.getElementById("websiteExcelPreview");

  websiteExcelImportOrders = [];

  if (!file) {
    if (preview) preview.innerHTML = "";
    return;
  }

  if (!window.XLSX) {
    alert("Excel 套件尚未載入，請重新整理後再試一次");
    return;
  }

  const buffer = await file.arrayBuffer();
  const text = decodeWebsiteExcelText(buffer);
  let rows = [];

  if (/<table/i.test(text)) {
    rows = buildRowsFromWebsiteHtmlTable(text);
  } else {
    const workbook = XLSX.read(buffer, { type: "array" });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    rows = buildRowsFromWebsiteSheet(sheet);
  }

  websiteExcelImportOrders = rows
    .map((row, index) => {
      const order = mapWebsiteExcelRow(row, index);
      order.duplicate_info = getWebsiteDuplicateInfo(order);
      return order;
    })
    .filter(o => o.name || o.phone || o.total || o.items.length);

  const duplicateCount = websiteExcelImportOrders.filter(o => o.duplicate_info).length;

  if (!preview) return;

  preview.innerHTML = `
    <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-3">
      讀到 ${rows.length} 列，可匯入 ${websiteExcelImportOrders.length} 筆。
      ${duplicateCount ? `其中 ${duplicateCount} 筆疑似已在訂單內，請先確認。` : "目前沒有發現疑似重複。"}
    </div>

    <div class="overflow-x-auto">
      <table class="w-full text-sm border">
        <thead class="bg-gray-100">
          <tr>
            <th class="p-2 border text-left">訂單</th>
            <th class="p-2 border text-left">客戶</th>
            <th class="p-2 border text-left">電話</th>
            <th class="p-2 border text-left">方式</th>
            <th class="p-2 border text-right">金額</th>
            <th class="p-2 border text-left">品項</th>
            <th class="p-2 border text-left">付款</th>
            <th class="p-2 border text-left">比對</th>
          </tr>
        </thead>
        <tbody>
          ${websiteExcelImportOrders.slice(0, 10).map(o => `
            <tr class="${o.duplicate_info ? "bg-red-50" : ""}">
              <td class="p-2 border">${o.source_order_id || o.id}</td>
              <td class="p-2 border">${o.name || "未填"}</td>
              <td class="p-2 border">${o.phone || ""}</td>
              <td class="p-2 border">${o.delivery}</td>
              <td class="p-2 border text-right">NT$ ${money(o.total)}</td>
              <td class="p-2 border">${o.items.map(i => `${i.name} x ${i.qty}`).join("、")}</td>
              <td class="p-2 border">${o.payment_method || ""} ${o.payment_note || ""}</td>
              <td class="p-2 border whitespace-pre-line ${o.duplicate_info ? "text-red-700 font-bold" : "text-green-700"}">
                ${o.duplicate_info ? "疑似重複：\n" + o.duplicate_info : "未發現重複"}
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
}

async function importWebsiteExcelOrders() {
  if (!websiteExcelImportOrders.length) {
    alert("請先選擇官網 Excel，並確認預覽正常");
    return;
  }

  const duplicateCount = websiteExcelImportOrders.filter(o => o.duplicate_info).length;
  const confirmText = duplicateCount
    ? `有 ${duplicateCount} 筆疑似重複。仍要匯入全部 ${websiteExcelImportOrders.length} 筆嗎？`
    : `確定匯入 ${websiteExcelImportOrders.length} 筆官網 Excel 訂單？`;

  if (!confirm(confirmText)) {
    return;
  }

  const existingIds = new Set(orders.map(o => String(o.id)));
  const insertOrders = websiteExcelImportOrders
    .filter(o => !existingIds.has(String(o.id)))
    .map(({ source_order_id, duplicate_info, ...order }) => order);

  if (insertOrders.length === 0) {
    alert("沒有新訂單可匯入，可能都已經存在");
    return;
  }

  const { error } = await db.from("orders").insert(insertOrders);

  if (error) {
    alert("匯入失敗：" + error.message);
    return;
  }

  alert(`官網 Excel 匯入成功：${insertOrders.length} 筆`);
  websiteExcelImportOrders = [];
  await refreshAdmin();
  showAdminTab("orders");
}

async function importEmailOrder() {
  const text = document.getElementById("emailOrderText").value;

  if (!text.trim()) {
    alert("請先貼上 Email 內容");
    return;
  }

  const getMatch = (label) => {
    const regex = new RegExp(label + "\\s*[:：]\\s*([^\\n\\r]+)");
    const match = text.match(regex);
    return match ? match[1].trim() : "";
  };

  const parseNumber = (value) => Number(String(value || "0").replace(/[^\d]/g, ""));

  const name = getMatch("訂購人姓名");
  const phone = getMatch("訂購人行動電話") || getMatch("訂購人聯絡電話");
  const address = getMatch("收件人地址") || getMatch("訂購人地址");
  const note = getMatch("其他說明");
  const totalText = getMatch("總金額");
  const total = parseNumber(totalText);

  const items = [];

  const lines = text
    .split(/\n/)
    .map(x => x.trim())
    .filter(Boolean);

  for (let i = 0; i < lines.length; i++) {
    const oneLineMatch = lines[i].match(/^(.+?)\s+(\d[\d,]*)\s+(\d[\d,]*)\s+(\d[\d,]*)$/);

    if (oneLineMatch) {
      items.push({
        id: "email-" + Date.now() + "-" + items.length,
        name: oneLineMatch[1].trim(),
        price: parseNumber(oneLineMatch[2]),
        qty: parseNumber(oneLineMatch[3])
      });

      continue;
    }

    const nameLine = lines[i];
    const priceLine = lines[i + 1];
    const qtyLine = lines[i + 2];
    const subtotalLine = lines[i + 3];

    if (
      nameLine &&
      /^\d[\d,]*$/.test(priceLine || "") &&
      /^\d[\d,]*$/.test(qtyLine || "") &&
      /^\d[\d,]*$/.test(subtotalLine || "")
    ) {
      items.push({
        id: "email-" + Date.now() + "-" + items.length,
        name: nameLine,
        price: parseNumber(priceLine),
        qty: parseNumber(qtyLine)
      });

      i += 3;
    }
  }

  if (!name || !phone) {
    alert("解析失敗：找不到姓名或電話");
    return;
  }

  if (items.length === 0) {
    alert("解析失敗：找不到商品明細");
    return;
  }

  const order = {
    id: "WEB" + Date.now(),
    time: new Date().toISOString(),
    name,
    phone,
    address,
    delivery: "宅配",
    pickup_date: null,
    arrival_date: null,
    ship_date: null,
    note: note || "官網 Email 匯入",
    items,
    total,
    status: "未完成",
    payment_status: "未收款",
    payment_method: "",
    paid_amount: 0,
    payment_note: "",
    type: "web"
  };

  const { error } = await db.from("orders").insert([order]);

  if (error) {
    alert("匯入失敗：" + error.message);
    return;
  }

  alert("官網 Email 訂單匯入成功");

  await refreshAdmin();
  showAdminTab("orders");
}

async function savePaperOrder() {
  const name = document.getElementById("paperName").value.trim();
  const phone = document.getElementById("paperPhone").value.trim();
  const delivery = document.getElementById("paperDelivery").value;
  const date = document.getElementById("paperDate").value;
  const address = document.getElementById("paperAddress").value.trim();
  const note = document.getElementById("paperNote").value.trim();
  const paymentStatus = document.getElementById("paperPaymentStatus").value;
  const paymentMethod = document.getElementById("paperPaymentMethod").value;
  const paymentNote = document.getElementById("paperPaymentNote").value.trim();

  if (!name) return alert("請填姓名");

  const rows = [...document.querySelectorAll("#paperRows > div")];
  const items = rows.map(r => {
    const sel = r.querySelector(".paperProduct");
    const p = products.find(x => String(x.id) === sel.value);
    const qty = Number(r.querySelector(".paperQty").value);
    const priceInput = r.querySelector(".paperPrice").value;
    const price = priceInput ? Number(priceInput) : Number(p.price);
    return { id: p.id, name: p.name, qty, price };
  }).filter(i => i.qty > 0);

  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  if (items.length === 0) return alert("請至少新增一個商品");

  const paidInput = document.getElementById("paperPaidAmount").value;
  const paidAmount = paymentStatus === "已收款"
    ? total
    : Number(paidInput || 0);

  const order = {
    id: "PB" + Date.now(),
    time: new Date().toISOString(),
    name,
    phone,
    address,
    delivery,
    pickup_date: delivery === "宅配" ? null : (date || null),
    arrival_date: delivery === "宅配" ? (date || null) : null,
    ship_date: delivery === "宅配" && date ? addDays(date, -3) : null,
    note,
    items,
    total,
    status: "未完成",
    payment_status: paymentStatus,
    payment_method: paymentMethod,
    paid_amount: paidAmount,
    payment_note: paymentNote,
    type: "paper"
  };

  const { error } = await db.from("orders").insert([order]);
  if (error) {
    alert("紙本訂單新增失敗：" + error.message);
    return;
  }

  alert("紙本訂單已新增");
  await refreshAdmin();
  showAdminTab("orders");
}

function getDateFromTime(value) {
  if (!value) return "";
  return String(value).slice(0, 10);
}

function isDateInRange(date, startDate, endDate) {
  if (!date) return false;
  if (startDate && date < startDate) return false;
  if (endDate && date > endDate) return false;
  return true;
}

function getWeekRange() {
  const today = parseDateOnly(todayStr());
  const day = today.getDay() || 7;
  const start = new Date(today);
  start.setDate(today.getDate() - day + 1);

  const end = new Date(start);
  end.setDate(start.getDate() + 6);

  return {
    start: formatDateOnly(start),
    end: formatDateOnly(end)
  };
}

function setStatsRange(type) {
  const startInput = document.getElementById("statsStart");
  const endInput = document.getElementById("statsEnd");
  if (!startInput || !endInput) return;

  if (type === "today") {
    startInput.value = todayStr();
    endInput.value = todayStr();
  }

  if (type === "week") {
    const range = getWeekRange();
    startInput.value = range.start;
    endInput.value = range.end;
  }

  if (type === "month") {
    const today = todayStr();
    startInput.value = today.slice(0, 8) + "01";
    endInput.value = today;
  }

  if (type === "all") {
    startInput.value = "";
    endInput.value = "";
  }

  renderStats();
}

function groupSum(list, getKey, getAmount) {
  return Object.values(list.reduce((groups, item) => {
    const key = getKey(item) || "未分類";

    if (!groups[key]) {
      groups[key] = {
        key,
        count: 0,
        amount: 0
      };
    }

    groups[key].count += 1;
    groups[key].amount += Number(getAmount(item) || 0);

    return groups;
  }, {})).sort((a, b) => b.amount - a.amount);
}

function renderMiniTable(rows, emptyText) {
  if (!rows.length) {
    return `<div class="text-gray-500 bg-gray-50 rounded-xl p-4">${emptyText}</div>`;
  }

  return `
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <tbody>
          ${rows.join("")}
        </tbody>
      </table>
    </div>
  `;
}

function getPaymentStatus(o) {
  return o.payment_status || "未收款";
}

function getPaidAmount(o) {
  return Number(o.paid_amount || 0);
}

function getUnpaidAmount(o) {
  return Math.max(Number(o.total || 0) - getPaidAmount(o), 0);
}

function getPaymentBadgeClass(o) {
  const status = getPaymentStatus(o);
  const unpaid = getUnpaidAmount(o);

  if (status === "已收款" || unpaid <= 0) return "bg-green-100 text-green-700 border-green-300";
  if (status === "訂金") return "bg-blue-100 text-blue-700 border-blue-300";
  if (status === "退款") return "bg-purple-100 text-purple-700 border-purple-300";

  return "bg-red-100 text-red-700 border-red-300";
}

function renderStats() {
  const startDate = document.getElementById("statsStart")?.value || "";
  const endDate = document.getElementById("statsEnd")?.value || "";
  const selectedDetail = window.statsDetailKey || "unfinished";

  const filteredOrders = orders.filter(o => {
    return isDateInRange(getDateFromTime(o.time), startDate, endDate);
  });

  const filteredExpenses = expenses.filter(e => {
    return isDateInRange(e.date || getDateFromTime(e.created_at), startDate, endDate);
  });

  const filteredIncomes = incomes.filter(i => {
    return isDateInRange(i.date || getDateFromTime(i.created_at), startDate, endDate);
  });

  const activeOrders = filteredOrders.filter(o => o.status !== "已取消");
  const orderRevenue = activeOrders.reduce((s, o) => s + Number(o.total || 0), 0);
  const onsiteRevenue = filteredIncomes.reduce((s, i) => s + Number(i.amount || 0), 0);
  const revenue = orderRevenue + onsiteRevenue;
  const expenseTotal = filteredExpenses.reduce((s, e) => s + Number(e.amount || 0), 0);
  const profit = revenue - expenseTotal;
  const profitRate = revenue > 0 ? Math.round((profit / revenue) * 1000) / 10 : 0;
  const receivableTotal = activeOrders.reduce((s, o) => s + Number(o.total || 0), 0);
  const receivedTotal = activeOrders.reduce((s, o) => s + getPaidAmount(o), 0) + onsiteRevenue;
  const unpaidTotal = activeOrders.reduce((s, o) => s + getUnpaidAmount(o), 0);
  const unpaidOrders = activeOrders.filter(o => getUnpaidAmount(o) > 0);
  const completedUnpaidOrders = unpaidOrders.filter(o => o.status === "已取貨" || o.status === "已宅配");
  const unpaidTrackingRows = unpaidOrders
    .slice()
    .sort((a, b) => {
      const completedRankA = (a.status === "已取貨" || a.status === "已宅配") ? 0 : 1;
      const completedRankB = (b.status === "已取貨" || b.status === "已宅配") ? 0 : 1;
      if (completedRankA !== completedRankB) return completedRankA - completedRankB;

      const urgentA = daysFromToday(getProcessDate(a));
      const urgentB = daysFromToday(getProcessDate(b));
      const urgentRankA = urgentA !== null && urgentA <= 0 ? 0 : 1;
      const urgentRankB = urgentB !== null && urgentB <= 0 ? 0 : 1;
      if (urgentRankA !== urgentRankB) return urgentRankA - urgentRankB;

      const amountDiff = getUnpaidAmount(b) - getUnpaidAmount(a);
      if (amountDiff !== 0) return amountDiff;

      return (getProcessDate(a) || "9999-12-31").localeCompare(getProcessDate(b) || "9999-12-31");
    })
    .slice(0, 20);

  const unfinishedOrders = orders.filter(o => !isClosedOrder(o));
  const todayPressureOrders = unfinishedOrders.filter(o => daysFromToday(getProcessDate(o)) === 0);
  const tomorrowPressureOrders = unfinishedOrders.filter(o => daysFromToday(getProcessDate(o)) === 1);
  const threeDayPressureOrders = unfinishedOrders.filter(o => {
    const diff = daysFromToday(getProcessDate(o));
    return diff !== null && diff > 1 && diff <= 3;
  });
  const overduePressureOrders = unfinishedOrders.filter(o => {
    const diff = daysFromToday(getProcessDate(o));
    return diff !== null && diff < 0;
  });
  const shipTodayOrders = unfinishedOrders.filter(o => o.delivery === "宅配" && daysFromToday(getShipDate(o)) === 0);
  const shipOverdueOrders = unfinishedOrders.filter(o => o.delivery === "宅配" && daysFromToday(getShipDate(o)) < 0);
  const todayPressure = todayPressureOrders.length;
  const tomorrowPressure = tomorrowPressureOrders.length;
  const threeDayPressure = threeDayPressureOrders.length;
  const overduePressure = overduePressureOrders.length;
  const shipToday = shipTodayOrders.length;
  const shipOverdue = shipOverdueOrders.length;

  const productMap = activeOrders.reduce((map, order) => {
    (order.items || []).forEach(item => {
      const name = item.raw_name || item.name || "未命名商品";

      const amount = Number(item.price || 0) * qty;

      if (!map[name]) {
        map[name] = {
          name,
          qty: 0,
          amount: 0
        };
      }

      map[name].qty += qty;
      map[name].amount += amount;
    });

function getStockRows() {
  return products
    .filter(p =>
      p.type !== "fee" &&
      p.type !== "box" &&
      !p.name.includes("粒裝") &&
      !p.name.includes("禮盒") &&
      !p.name.includes("6粒") &&
      !p.name.includes("10粒") &&
      !p.name.includes("12粒") &&
      !p.name.includes("20粒")
    )
    .map(p => {
      let reservedQty = 0;
      const relatedOrders = [];

      orders
        .filter(o => !isClosedOrder(o))
        .forEach(order => {
          let orderQty = 0;

          (order.items || []).forEach(item => {
            if (Number(item.id) === Number(p.id)) {
              orderQty += Number(item.qty || 0);
            }

            const boxProduct = products.find(
              x => Number(x.id) === Number(item.id)
            );

            if (
              boxProduct &&
              boxProduct.type === "box" &&
              Array.isArray(boxProduct.components)
            ) {
              boxProduct.components.forEach(comp => {
                if (Number(comp.productId) === Number(p.id)) {
                  orderQty +=
                    Number(comp.qty || 0) *
                    Number(item.qty || 0);
                }
              });
            }
          });

          if (orderQty > 0) {
            reservedQty += orderQty;
            relatedOrders.push({
              id: order.id,
              name: order.name || "未填姓名",
              date: getProcessDate(order) || "未填日期",
              qty: orderQty,
              shortage: hasNearStockShortage(order)
            });
          }
        });

      const stock = Number(p.stock || 0);
      const remain = stock - reservedQty;
      const percent = stock > 0
        ? Math.min((reservedQty / stock) * 100, 100)
        : reservedQty > 0 ? 100 : 0;

      let level = "safe";
      let statusText = "安全";
      let statusClass = "bg-green-50 border-green-200 text-green-700";

      if (remain <= 300) {
        level = "watch";
        statusText = "注意";
        statusClass = "bg-yellow-50 border-yellow-200 text-yellow-700";
      }

      if (remain <= 100) {
        level = "low";
        statusText = "快補貨";
        statusClass = "bg-red-50 border-red-200 text-red-700";
      }

      return {
        product: p,
        stock,
        reservedQty,
        remain,
        percent,
        level,
        statusText,
        statusClass,
        relatedOrders
      };
    });
}

function setStockMode(mode) {
  window.stockMode = mode;

}

function setStockSort(sort) {
  window.stockSort = sort;

}

function renderStock() {
  const mode = window.stockMode || "all";
  const sort = window.stockSort || "risk";
  const rows = getStockRows();

  const filteredRows = rows
    .filter(row => {
      if (mode === "low") return row.level === "low";
      if (mode === "watch") return row.level === "watch";
      if (mode === "safe") return row.level === "safe";
      if (mode === "needed") return row.reservedQty > 0;
      return true;
    })
    .sort((a, b) => {
      if (sort === "remain") return a.remain - b.remain;
      if (sort === "demand") return b.reservedQty - a.reservedQty;
      if (sort === "stock") return a.stock - b.stock;

      const levelRank = { low: 1, watch: 2, safe: 3 };
      const rankDiff = levelRank[a.level] - levelRank[b.level];
      if (rankDiff !== 0) return rankDiff;

      return a.remain - b.remain;
    });

  const stockButton = (key, label, count, cls) => `
    <button onclick="setStockMode('${key}')"
      class="${cls} text-white px-4 py-2 rounded-xl ${mode === key ? "ring-4 ring-amber-300" : ""}">
      ${label} ${count}
    </button>
  `;

  const lowCount = rows.filter(r => r.level === "low").length;
  const watchCount = rows.filter(r => r.level === "watch").length;
  const safeCount = rows.filter(r => r.level === "safe").length;
  const neededCount = rows.filter(r => r.reservedQty > 0).length;

  document.getElementById("adminPanel").innerHTML = `
    <h2 class="text-2xl font-bold mb-4">庫存查看</h2>

    <div class="flex gap-2 flex-wrap mb-4">
      ${stockButton("all", "全部", rows.length, "bg-gray-700")}
      ${stockButton("low", "快補貨", lowCount, "bg-red-700")}
      ${stockButton("watch", "注意", watchCount, "bg-yellow-600")}
      ${stockButton("needed", "有訂單需求", neededCount, "bg-blue-700")}
      ${stockButton("safe", "安全", safeCount, "bg-green-700")}

      <select onchange="setStockSort(this.value)" class="border p-2 rounded-xl">
        <option value="risk" ${sort === "risk" ? "selected" : ""}>依風險排序</option>
        <option value="remain" ${sort === "remain" ? "selected" : ""}>可用庫存少到多</option>
        <option value="demand" ${sort === "demand" ? "selected" : ""}>訂單需求多到少</option>
        <option value="stock" ${sort === "stock" ? "selected" : ""}>實際庫存少到多</option>
      </select>
    </div>

    <div class="bg-amber-50 p-4 rounded-xl mb-4 text-sm text-amber-900">
      可用庫存 = 實際庫存 - 未完成訂單需求；禮盒會自動拆成單品需求計算。
      目前顯示 ${filteredRows.length} / ${rows.length} 項。
    </div>

    <div class="grid md:grid-cols-3 gap-4">
      ${filteredRows.map(row => `
        <div class="p-5 rounded-2xl shadow border ${row.statusClass}">
          <div class="flex justify-between gap-2">
            <div class="font-bold text-xl">${row.product.name}</div>
            <div class="font-bold">${row.statusText}</div>
          </div>

          <div class="grid grid-cols-3 gap-2 mt-4 text-center">
            <div class="bg-white/70 rounded-xl p-3">
              <div class="text-xs text-gray-500">實際</div>
              <div class="text-xl font-bold">${row.stock}</div>
            </div>
            <div class="bg-white/70 rounded-xl p-3">
              <div class="text-xs text-gray-500">需求</div>
              <div class="text-xl font-bold">${row.reservedQty}</div>
            </div>
            <div class="bg-white/70 rounded-xl p-3">
              <div class="text-xs text-gray-500">可用</div>
              <div class="text-xl font-bold">${row.remain}</div>
            </div>
          </div>

          <div class="w-full bg-white/70 rounded-full h-3 mt-4">
            <div class="bg-orange-500 h-3 rounded-full" style="width:${row.percent}%"></div>
          </div>

          <div class="mt-3 text-sm">
            ${
              row.relatedOrders.length
                ? row.relatedOrders.slice(0, 4).map(order => `
                  <button onclick="openOrderInOrders('${order.id}')"
                    class="block text-left w-full py-1 ${order.shortage ? "text-red-700 font-bold" : "text-blue-700"} hover:underline">
                    ${order.shortage ? "⚠️ " : ""}${order.date}｜${order.name}｜需求 ${order.qty}
                  </button>
                `).join("")
                : `<div class="text-gray-500">目前沒有未完成訂單需求</div>`
            }
            ${
              row.relatedOrders.length > 4
                ? `<div class="text-gray-500">另有 ${row.relatedOrders.length - 4} 筆訂單需求</div>`
                : ""
            }
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

async function updateProduct(id, field, value) {
  const updateData = {};
  updateData[field] = ["price", "web_price", "stock"].includes(field)
    ? Number(value || 0)
    : value;

  const { error } = await db
    .from("products")
    .update(updateData)
    .eq("id", id);

  if (error) {
    alert("更新失敗：" + error.message);
    return;
  }

  await loadProducts();
  renderProductAdmin();
}
async function addNewProduct() {
  const name = document.getElementById("newName").value.trim();
  const price = Number(document.getElementById("newPrice").value);
  const web_price = Number(document.getElementById("newWebPrice").value);
  const stock = Number(document.getElementById("newStock").value);
  const type = document.getElementById("newType").value;
  const compText = document.getElementById("newComponents").value.trim();

  if (!name) return alert("請輸入商品名稱");

  let components = null;

  if (type === "box") {
    if (!compText) return alert("請輸入禮盒組成");

    try {
      components = JSON.parse(compText);
    } catch (e) {
      return alert("JSON 格式錯誤");
    }
  }

  const newProduct = {
    id: Date.now(),
    name,
    price: price || 0,
    web_price: web_price || price || 0,
    stock: type === "single" ? (stock || 0) : 0,
    type: type,
    components: type === "box" ? components : null,
    active: true
  };

  const { error } = await db.from("products").insert([newProduct]);

  if (error) {
    alert("新增失敗：" + error.message);
    return;
  }

  alert("新增成功");

  await loadProducts();
  renderProductAdmin();
}
