<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陳媽媽肉粽後台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-100">
  <div class="max-w-6xl mx-auto bg-white min-h-screen shadow-xl">
    <header class="bg-amber-800 text-white p-6">
      <h1 class="text-3xl font-bold">🍙 陳媽媽肉粽後台管理</h1>
    </header>

    <div class="p-8">
      <h2 class="text-2xl font-bold mb-6">商品列表（點擊加入訂單）</h2>
      <div id="products" class="grid grid-cols-2 md:grid-cols-3 gap-6 mb-12"></div>

      <h2 class="text-2xl font-bold mb-6">新增訂單</h2>
      <div class="bg-amber-50 p-8 rounded-3xl mb-12">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input id="name" placeholder="客戶姓名" class="border p-4 rounded-2xl">
          <input id="phone" placeholder="客戶電話" class="border p-4 rounded-2xl">
          <input id="items" placeholder="商品明細" class="border p-4 rounded-2xl col-span-2">
          <button onclick="submitOrder()" class="bg-amber-600 hover:bg-amber-700 text-white py-6 rounded-3xl text-xl font-bold col-span-2">
            新增訂單（自動存 Google Sheets）
          </button>
        </div>
      </div>

      <h2 class="text-2xl font-bold mb-6 flex justify-between">
        最新訂單列表 
        <button onclick="loadOrders()" class="text-sm bg-gray-200 px-4 py-2 rounded-xl">🔄 刷新</button>
      </h2>
      <div id="order-list" class="space-y-4"></div>
    </div>
  </div>

  <script>
    const SHEET_ID = '1m9K_fcsoMYMOA_CvHYypXlWOOUU8RAArD4R5MikV-qw';

    async function loadOrders() {
      const container = document.getElementById('order-list');
      container.innerHTML = '<p class="text-center py-8 text-gray-500">正在讀取訂單...</p>';

      try {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=訂單列表`;
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));

        container.innerHTML = '';

        const rows = json.table.rows.slice(1).reverse();

        if (rows.length === 0) {
          container.innerHTML = `<p class="text-center py-12 text-gray-500">目前沒有訂單</p>`;
          return;
        }

        rows.forEach(row => {
          const c = row.c || [];
          const orderId = c[0]?.v || c[0]?.f || '無ID';
          const date = c[1]?.v || '';
          const name = c[2]?.v || '';
          const phone = c[3]?.v || '';
          const items = c[4]?.v || '';
          const status = c[6]?.v || '待處理';

          const div = document.createElement('div');
          div.className = `bg-white border rounded-3xl p-6 shadow`;
          div.innerHTML = `
            <div class="flex justify-between">
              <div class="font-bold">${orderId}</div>
              <span class="px-3 py-1 rounded-full text-sm ${status.includes('已取貨') ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">${status}</span>
            </div>
            <div class="text-sm text-gray-500 mt-2">${date}　${name}　${phone}</div>
            <div class="mt-3 text-gray-700">${items}</div>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        console.error(err);
        container.innerHTML = `<p class="text-red-500 text-center py-12">讀取失敗，請按 F12 查看錯誤後告訴我</p>`;
      }
    }

    window.onload = loadOrders;
  </script>
</body>
</html>
