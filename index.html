<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陳媽媽肉粽後台管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-100">
  <div class="max-w-7xl mx-auto bg-white min-h-screen shadow-xl">
    <header class="bg-amber-800 text-white p-6 flex justify-between items-center">
      <h1 class="text-3xl font-bold">🍙 陳媽媽肉粽後台管理</h1>
    </header>

    <div class="p-8">
      <h2 class="text-2xl font-bold mb-6">商品列表</h2>
      <div id="products" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12"></div>

      <h2 class="text-2xl font-bold mb-6">新增訂單</h2>
      <div class="bg-amber-50 p-8 rounded-3xl mb-12">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input id="name" type="text" placeholder="客戶姓名" class="border p-4 rounded-2xl text-lg">
          <input id="phone" type="text" placeholder="客戶電話" class="border p-4 rounded-2xl text-lg">
          <input id="items" type="text" placeholder="商品明細 (例如: 北部粽 x2、南部粽 x1)" class="border p-4 rounded-2xl text-lg col-span-2">
          <button onclick="submitOrder()" 
                  class="bg-amber-600 hover:bg-amber-700 text-white py-5 rounded-3xl text-xl font-bold col-span-2">
            新增訂單
          </button>
        </div>
      </div>

      <h2 class="text-2xl font-bold mb-6">最新訂單</h2>
      <div id="order-list" class="space-y-4"></div>
    </div>
  </div>

  <script>
    const SHEET_ID = '1m9K_fcsoMYMOA_CvHYypXlWOOUU8RAArD4R5MikV-qw';

    async function loadProducts() {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=商品列表`;
      const res = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));

      const div = document.getElementById('products');
      div.innerHTML = json.table.rows.slice(1).map(row => {
        const name = row.c[1]?.v || '';
        const price = row.c[2]?.v || 0;
        const stock = row.c[3]?.v || 0;
        return `
          <div class="bg-white p-6 rounded-3xl shadow">
            <div class="font-bold text-xl">${name}</div>
            <div class="text-4xl font-bold text-amber-600 mt-2">$${price}</div>
            <div class="mt-4 text-sm">
              庫存: <span class="font-bold ${stock <= 10 ? 'text-red-500' : 'text-emerald-600'}">${stock}</span>
            </div>
          </div>`;
      }).join('');
    }

    let orders = [];

    function submitOrder() {
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      const items = document.getElementById('items').value;

      if (!name || !items) {
        alert('請填寫客戶姓名和商品明細');
        return;
      }

      const newOrder = {
        id: 'ORD-' + Date.now().toString().slice(-6),
        date: new Date().toLocaleDateString('zh-TW'),
        name: name,
        phone: phone,
        items: items,
        status: '待處理'
      };

      orders.unshift(newOrder);

      renderOrders();

      // 清空表單
      document.getElementById('name').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('items').value = '';

      alert('✅ 訂單已新增！\n\n（目前還在瀏覽器記憶中，之後可再接 Google Sheets 自動儲存）');
    }

    function renderOrders() {
      const div = document.getElementById('order-list');
      div.innerHTML = orders.map(order => `
        <div class="bg-white p-6 rounded-3xl shadow flex justify-between items-center">
          <div>
            <div class="font-bold">${order.id} - ${order.date}</div>
            <div>${order.name} (${order.phone})</div>
            <div class="text-amber-600">${order.items}</div>
          </div>
          <div class="text-right">
            <span class="inline-block px-5 py-2 bg-amber-100 text-amber-700 rounded-full font-medium">${order.status}</span>
          </div>
        </div>
      `).join('');
    }

    window.onload = () => {
      loadProducts();
      renderOrders();
    };
  </script>
</body>
</html>
