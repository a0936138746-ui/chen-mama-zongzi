<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陳媽媽肉粽訂單系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-amber-50">
  <div class="max-w-6xl mx-auto bg-white min-h-screen shadow-xl">
    <header class="bg-amber-800 text-white p-6 flex justify-between">
      <h1 class="text-3xl font-bold">陳媽媽肉粽訂單系統</h1>
      <div class="space-x-8">
        <button onclick="switchTab(0)" class="font-medium">前台下單</button>
        <button onclick="switchTab(1)" class="font-medium">後台管理</button>
      </div>
    </header>

    <div id="main" class="p-12 text-center">
      <h2 class="text-4xl font-bold text-amber-700 mb-6">系統載入中...</h2>
      <p id="status" class="text-lg text-gray-600">正在連接資料庫...</p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://rlflaetztuvggnqzea.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsZmxhZXR6aHR1dmdnZ25xemVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTI3NDgsImV4cCI6MjA5MjE2ODc0OH0.1Bl8SE9KAQ68krOJz_1ThlN2tYYl9pwgE8XQghponn8';

    async function init() {
      const status = document.getElementById('status');
      try {
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const { data, error } = await supabase
          .from('products')
          .select('id, name, price')
          .limit(3);

        if (error) throw error;

        status.innerHTML = `
          <span class="text-green-600 text-5xl">✅</span><br>
          <span class="text-3xl font-bold text-green-600">連接成功！</span><br>
          <span class="text-xl mt-4 block">已成功讀取 ${data.length} 筆商品資料</span>
          <p class="mt-10 text-gray-500">你的肉粽訂單系統已正式上線</p>
        `;
      } catch (err) {
        console.error(err);
        status.innerHTML = `
          <span class="text-red-600 text-5xl">❌</span><br>
          <span class="text-2xl font-bold">連接失敗</span><br>
          <span class="text-red-500">錯誤: ${err.message || 'Failed to fetch'}</span>
        `;
      }
    }

    function switchTab(n) {
      alert('完整功能開發中，敬請期待！目前先測試資料庫連接。');
    }

    window.onload = init;
  </script>
</body>
</html>
