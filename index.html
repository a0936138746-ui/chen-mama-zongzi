<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陳媽媽肉粽後台管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-100">
  <div class="max-w-7xl mx-auto bg-white min-h-screen shadow-xl">
    <header class="bg-amber-800 text-white p-6">
      <h1 class="text-3xl font-bold">🍙 陳媽媽肉粽後台管理</h1>
    </header>

    <div class="p-8">
      <h2 class="text-2xl font-bold mb-6">商品列表</h2>
      <div id="products" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-12"></div>

      <h2 class="text-2xl font-bold mb-6">新增訂單</h2>
      <div class="bg-gray-50 p-6 rounded-xl mb-12">
        <!-- 新增訂單表單會在程式動態產生 -->
        <div id="order-form"></div>
      </div>

      <h2 class="text-2xl font-bold mb-6">訂單列表</h2>
      <div id="orders" class="overflow-x-auto"></div>
    </div>
  </div>

  <script>
    const SHEET_ID = '1m9K_fcsoMYMOA_CvHYypXlWOOUU8RAArD4R5MikV-qw';
    const API_KEY = 'AIzaSyD9z5z5z5z5z5z5z5z5z5z5z5z5z5z5z5'; // 暫時用公開方式，之後可優化

    async function loadProducts() {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=商品列表`;
      const res = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      
      const productsDiv = document.getElementById('products');
      productsDiv.innerHTML = json.table.rows.map(row => {
        const name = row.c[1]?.v || '';
        const price = row.c[2]?.v || 0;
        const stock = row.c[3]?.v || 0;
        return `
          <div class="bg-white p-5 rounded-2xl shadow border">
            <div class="font-bold text-lg">${name}</div>
            <div class="text-2xl font-bold text-amber-600">$${price}</div>
            <div class="text-sm text-gray-500">庫存: ${stock}</div>
          </div>`;
      }).join('');
    }

    async function loadOrders() {
      // 後續會實作
      document.getElementById('orders').innerHTML = `<p class="text-gray-500">訂單列表開發中...（可從 Google Sheets 直接查看）</p>`;
    }

    window.onload = () => {
      loadProducts();
      loadOrders();
    };
  </script>
</body>
</html>
